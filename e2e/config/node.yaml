version: v3
teleport:
  nodename: docker-node
  auth_token: foo
  data_dir: /var/lib/teleport
  log:
    output: stderr
    severity: TRACE
    format:
      output: text
  auth_server: host.docker.internal:3025

auth_service:
  enabled: "no"

ssh_service:
  enabled: "yes"
  public_addr: localhost:3022
  labels:
    env: example

proxy_service:
  enabled: "no"
