version: v2

inputs:
  - directory: .
    exclude_paths:
      # generated by buf-gogo.gen.yaml
      - api/proto/teleport/attestation/
      - api/proto/teleport/componentfeatures/
      - api/proto/teleport/legacy/
      - api/proto/teleport/mfa/
      - api/proto/teleport/usageevents/
      - proto/teleport/lib/web/terminal/envelope.proto
      # generated by buf-connect-go.gen.yaml
      - proto/prehog/
      # generated by buf-ts.gen.yaml, JS-only
      - proto/teleport/web/
  - directory: .
    paths:
      # excluded by buf-gogo.gen.yaml
      - api/proto/teleport/legacy/client/proto/event.proto
      - api/proto/teleport/legacy/client/proto/inventory.proto
      - api/proto/teleport/legacy/client/proto/requestable_roles.proto

plugins:
  - local:
      - go
      - run
      - google.golang.org/protobuf/cmd/protoc-gen-go
    out: .
    opt:
      - module=github.com/gravitational/teleport
      # needed by teleport/lib/teleterm/v1/usage_events.proto because we use
      # managed mode for the go package name there
      - Mprehog/v1alpha/connect.proto=github.com/gravitational/teleport/gen/proto/go/prehog/v1alpha;prehogv1alpha
      # needed by proto/accessraph/v1alpha/access_graph_service.go because it imports it for
      # usage events
      - Mprehog/v1alpha/teleport.proto=github.com/gravitational/teleport/gen/proto/go/prehog/v1alpha;prehogv1alpha
      # Testing conversion to the Opaque API.
      - apilevelMteleport/workloadidentity/v1/attrs.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/issuance_service.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/join_attrs.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/resource.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/resource_service.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/revocation_resource.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/revocation_service.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/sigstore.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/sigstore_policy_resource.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/sigstore_policy_service.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/x509_overrides.proto=API_HYBRID
      - apilevelMteleport/workloadidentity/v1/x509_overrides_service.proto=API_HYBRID
    strategy: all
  - local:
      - go
      - run
      - google.golang.org/grpc/cmd/protoc-gen-go-grpc
    out: .
    opt:
      - module=github.com/gravitational/teleport
      # needed by teleport/lib/teleterm/v1/usage_events.proto because we use
      # managed mode for the go package name there
      - Mprehog/v1alpha/connect.proto=github.com/gravitational/teleport/gen/proto/go/prehog/v1alpha;prehogv1alpha
      # needed by proto/accessraph/v1alpha/access_graph_service.go because it imports it for
      # usage events
      - Mprehog/v1alpha/teleport.proto=github.com/gravitational/teleport/gen/proto/go/prehog/v1alpha;prehogv1alpha
    strategy: all
