version: v2

inputs:
  - directory: .
    exclude_paths:
      # generated by buf-gogo.gen.yaml
      - api/proto/teleport/attestation/
      - api/proto/teleport/componentfeatures/
      - api/proto/teleport/legacy/
      - api/proto/teleport/mfa/
      - api/proto/teleport/usageevents/
      - proto/teleport/lib/web/terminal/envelope.proto
      # generated by buf-connect-go.gen.yaml
      - proto/prehog/
      # generated by buf-ts.gen.yaml, JS-only
      - proto/teleport/web/
  - directory: .
    paths:
      # excluded by buf-gogo.gen.yaml
      - api/proto/teleport/legacy/client/proto/event.proto
      - api/proto/teleport/legacy/client/proto/inventory.proto
      - api/proto/teleport/legacy/client/proto/requestable_roles.proto

plugins:
  - local:
      - go
      - run
      - google.golang.org/protobuf/cmd/protoc-gen-go
    out: .
    opt:
      - module=github.com/gravitational/teleport
      # All new protos should use the OPAQUE API by default.
      - default_api_level=API_OPAQUE
      # All existing protos should remain on the OPEN API allowing them
      # to be migrated one by one to the OPAQUE API.
      - apilevelMteleport/access_graph/v1/authorized_key.proto=API_HYBRID
      - apilevelMteleport/access_graph/v1/private_key.proto=API_OPEN
      - apilevelMteleport/access_graph/v1/secrets_service.proto=API_OPEN
      - apilevelMteleport/accesslist/v1/accesslist.proto=API_OPEN
      - apilevelMteleport/accesslist/v1/accesslist_service.proto=API_OPEN
