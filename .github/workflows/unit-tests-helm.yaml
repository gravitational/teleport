name: Unit Tests (Helm)
run-name: Unit Tests (Helm) - ${{ github.run_id }} - @${{ github.actor }}

on:
  pull_request:
  merge_group:

jobs:
  changes:
    name: Check for relevant changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - name: Checkout
        if: ${{ github.event_name == 'merge_group' }}
        uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          base: ${{ github.event.pull_request.base.ref || github.event.merge_group.base_ref }}
          ref: ${{ github.event.pull_request.head.ref || github.event.merge_group.head_ref }}
          filters: |
            changed:
              - '.github/workflows/unit-tests-helm.yaml'
              - 'build.assets/helm-unittest.version'
              - 'examples/chart/**'
              - 'Makefile'
              - 'docs/pages/reference/helm-reference/*'
              - 'docs/pages/includes/helm-reference/*'

  test:
    name: Unit Tests (Helm)
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'dependabot/') && needs.changes.outputs.changed == 'true' }}

    permissions:
      contents: read

    container:
      image: ghcr.io/gravitational/teleport-buildbox:teleport19
      env:
        HELM_PLUGINS: /home/ci/.local/share/helm/plugins
        HELM_UNITTEST_VERSION_FILE: build.assets/helm-unittest.version

    steps:
      - name: Checkout Teleport
        uses: actions/checkout@v6

      - name: Install pinned helm-unittest plugin
        run: |
          set -euo pipefail
          plugin_version="$(cat "${HELM_UNITTEST_VERSION_FILE}")"
          desired_version="${plugin_version#v}"
          current_version="$(helm plugin list | grep '^unittest\t' | cut -f2)"

          # Ensure we're running the correct unittest plugin, even if the
          # buildbox has a different version. Without this, plugin upgrades that
          # involve breaking changes are impossible -- upgrading the buildbox
          # first fails because our unittests would break with the new plugin 
          # version, but upgrading the unittests first fails because the
          # buildbox doesn't yet have the new version. This solution uses the
          # buildbox version if it's already at the expected version but
          # downloads the expected version if it's not.
          if [ "$current_version" = "$desired_version" ] && [ -d "${HELM_PLUGINS}/helm-unittest" ]; then
            echo "helm-unittest ${plugin_version} already installed in ${HELM_PLUGINS}; skipping download"
            exit 0
          fi

          mkdir -p "${HELM_PLUGINS}"
          rm -rf "${HELM_PLUGINS}/helm-unittest"
          helm plugin install https://github.com/helm-unittest/helm-unittest --version "$plugin_version"
          helm plugin list

      - name: Lint helm
        timeout-minutes: 10
        run: make lint-helm

      - name: Run tests
        timeout-minutes: 10
        run: make test-helm
