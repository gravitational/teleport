---
name: Update AMI IDs

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: Release version tag (ex. 12.1.0)

  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: Release version tag (ex. 12.1.0)

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-ami-ids:
    name: Update AMI IDs
    runs-on: ubuntu-latest
    environment: post-release

    steps:
      - name: Get runtime values from kvstore
        id: kvstore
        uses: gravitational/shared-workflows/tools/env-kvstore@tools/env-kvstore/v1.0.0
        with:
          cognito-identity-pool-id: "us-west-2:da53389e-a459-4a28-bd54-43eeb8e4b579"
          cognito-role-arn: "arn:aws:iam::247230412011:role/github-actions-cognito-oidc"
          existing-gh-secrets: "${{ toJSON(secrets) }}"
          existing-gh-variables: "${{ toJSON(vars) }}"
          # values: |
          #   APP_ID,variable
          #   PRIVATE_KEY,secret

      - name: Generate Github token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Assume AWS role
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          aws-region: us-west-2
          role-to-assume: "arn:aws:iam::146628656107:role/tf-teleport-ami-gha-role"
          role-session-name: "gha-update-ami-ids-${{ github.run_number }}"

      - name: Update AMI IDs and create PR
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          VERSION: ${{ inputs.version }}
          PR_REVIEWER: ${{ github.event.release.author.login }}
        run: |
          git config --global user.email "128860004+teleport-post-release-automation[bot]@users.noreply.github.com"
          git config --global user.name "teleport-post-release-automation[bot]"
          make -C assets/aws create-update-pr "TELEPORT_VERSION=${VERSION}" "AMI_PR_REVIEWER=${PR_REVIEWER}"
          echo "AMI PR: $(gh pr view --json url --jq .url)" >> "$GITHUB_STEP_SUMMARY"
