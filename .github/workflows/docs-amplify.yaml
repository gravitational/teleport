name: Docs Preview
on:
  pull_request:
    paths:
      - 'docs/**'
      - .github/workflows/docs-amplify.yaml
  workflow_dispatch:

permissions:
  pull-requests: write
  id-token: write

jobs:
  amplify-preview:
    name: Prepare Amplify preview URL
    runs-on: ubuntu-slim
    environment: docs-amplify
    steps:
    - name: Get runtime values from kvstore
      id: kvstore
      uses: gravitational/shared-workflows/tools/env-kvstore@tools/env-kvstore/v1.0.0
      with:
        cognito-identity-pool-id: "us-west-2:da53389e-a459-4a28-bd54-43eeb8e4b579"
        cognito-role-arn: "arn:aws:iam::247230412011:role/github-actions-cognito-oidc"
        existing-gh-secrets: "${{ toJSON(secrets) }}"
        existing-gh-variables: "${{ toJSON(vars) }}"
        values: |
          AMPLIFY_APP_IDS,variable
          IAM_ROLE,variable

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v4
      with:
        aws-region: us-west-2
        role-to-assume: ${{ env.IAM_ROLE }}

    - name: Create Amplify preview environment
      uses: gravitational/shared-workflows/tools/amplify-preview@b90d744feb39522329fba9c7764a4fe07d039d29 # tools/amplify-preview/v0.0.3
      id: amplify_preview
      with:
        app_ids: ${{ env.AMPLIFY_APP_IDS }}
        create_branches: "true"
        github_token: ${{ secrets.GITHUB_TOKEN }}
        wait: "true"

    - name: Print failure message
      if: failure()
      env:
        ERR_TITLE: Teleport Docs preview build failed
        ERR_MESSAGE: >-
          Please refer to the following documentation for help: https://www.notion.so/goteleport/How-to-Amplify-deployments-162fdd3830be8096ba72efa1a49ee7bc?pvs=4
          Execution info: ${{ steps.amplify_preview.outputs.amplify_app_id }} ${{ steps.amplify_preview.outputs.amplify_branch_name }} ${{ steps.amplify_preview.outputs.amplify_job_id }}
      run: |
        echo ::error title=$ERR_TITLE::$ERR_MESSAGE
        exit 1
