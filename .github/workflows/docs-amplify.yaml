name: Docs Preview
on:
  pull_request:
    paths:
      - 'docs/**'
      - .github/workflows/docs-amplify.yaml
  workflow_dispatch:

permissions:
  pull-requests: write
  id-token: write

jobs:
  amplify-preview:
    name: Prepare Amplify preview URL
    runs-on: ubuntu-slim
    environment: docs-amplify
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v4
      with:
        aws-region: us-west-2
        role-to-assume: ${{ vars.IAM_ROLE }}

    - name: Create Amplify preview environment
      uses: gravitational/shared-workflows/tools/amplify-preview@b90d744feb39522329fba9c7764a4fe07d039d29 # tools/amplify-preview/v0.0.3
      id: amplify_preview
      with:
        app_ids: ${{ vars.AMPLIFY_APP_IDS }}
        create_branches: "true"
        github_token: ${{ secrets.GITHUB_TOKEN }}
        wait: "true"

    - name: Comment per-page preview links
      if: success()
      uses: actions/github-script@v7
      env:
        PREVIEW_BRANCH: ${{ steps.amplify_preview.outputs.amplify_branch_name }}
        PREVIEW_APP_ID: ${{ steps.amplify_preview.outputs.amplify_app_id }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const previewBranch = process.env.PREVIEW_BRANCH;
          if (!previewBranch) {
            core.warning("No preview branch name available from amplify-preview step; skipping per-page comment.");
            return;
          }

          const previewAppId = process.env.PREVIEW_APP_ID;
          if (!previewAppId) {
            core.warning("No preview app ID available from amplify-preview step; skipping per-page comment.");
            return;
          }

          const previewHost = `https://${previewBranch}.${previewAppId}.amplifyapp.com`;

          // Get changed files in this PR, filtered to docs/ MDX pages.
          const { data: files } = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            per_page: 100,
          });

          const pageLinks = files
            .filter(f => f.status !== 'removed')
            .map(f => f.filename)
            .filter(p => p.startsWith('docs/pages/'))
            .filter(p => p.endsWith('.mdx'))
            .filter(p => !p.includes('/includes/'))
            .map(p => {
              // Strip docs/pages/ prefix and .mdx extension.
              let urlPath = p.replace(/^docs\/pages\//, '').replace(/\.mdx$/, '');
              // index pages map to their parent directory.
              urlPath = urlPath.replace(/\/index$/, '');
              return { file: p, url: `${previewHost}/docs/${urlPath}/` };
            });

          if (pageLinks.length === 0) {
            console.log("No docs pages changed; skipping per-page comment.");
            return;
          }

          const marker = "<!-- amplify-per-page-preview -->";
          const body = [
            marker,
            "### Preview links for changed docs pages",
            "",
            ...pageLinks.map(l => `- [\`${l.file}\`](${l.url})`),
          ].join("\n");

          // Update the existing comment if one exists, otherwise create a new one.
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body && c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Print failure message
      if: failure()
      env:
        ERR_TITLE: Teleport Docs preview build failed
        ERR_MESSAGE: >-
          Please refer to the following documentation for help: https://www.notion.so/goteleport/How-to-Amplify-deployments-162fdd3830be8096ba72efa1a49ee7bc?pvs=4
          Execution info: ${{ steps.amplify_preview.outputs.amplify_app_id }} ${{ steps.amplify_preview.outputs.amplify_branch_name }} ${{ steps.amplify_preview.outputs.amplify_job_id }}
      run: |
        echo ::error title=$ERR_TITLE::$ERR_MESSAGE
        exit 1