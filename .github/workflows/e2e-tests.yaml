name: E2E Tests
run-name: E2E Tests
on:
  # Only allow manual triggers
  workflow_dispatch:

jobs:
  build:
    name: Build binaries
    if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    container:
      image: ghcr.io/gravitational/teleport-buildbox-centos7:teleport19-amd64
      env:
        GOCACHE: /tmp/gocache

    steps:
      - name: Checkout Teleport
        uses: actions/checkout@v6 # Cannot upgrade to v4 while this runs in centos:7 due to nodejs GLIBC incompatibility

      - name: Prepare workspace
        uses: ./.github/actions/prepare-workspace

      - name: Run make
        run: |
          make binaries

      - name: Upload binaries
        continue-on-error: true
        uses: Anomalous-Ventures/devops/.github/actions/upload-s3@66345e915e2b88f14e9d1426ec37d7247c75921c # main
        with:
          name: build
          path: ${{ github.workspace }}/build/
          access-key: ${{ secrets.MINIO_ACCESS_KEY }}
          secret-key: ${{ secrets.MINIO_SECRET_KEY }}

  test:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: Anomalous-Ventures/devops/.github/actions/download-s3@66345e915e2b88f14e9d1426ec37d7247c75921c # main
        with:
          name: build
          path: ${{ github.workspace }}/build/
          access-key: ${{ secrets.MINIO_ACCESS_KEY }}
          secret-key: ${{ secrets.MINIO_SECRET_KEY }}

      - name: Chmod binaries
        run: |
          chmod +x build/teleport
          chmod +x build/tctl
          chmod +x build/tsh

      - name: Build Images
        run: |
          make -C e2e build
      - name: Run Tests
        run: |
          make test-e2e
