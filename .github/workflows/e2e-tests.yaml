name: E2E Tests
run-name: E2E Tests
on:
  pull_request:
    paths:
      - '.github/workflows/e2e-tests.yaml'
      - '**.go'
      - 'e2e/**'
      - 'web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches:
      - master
      - branch/**

jobs:
  build:
    name: Build Teleport
    runs-on: ubuntu-22.04-32core

    permissions:
      contents: read

    container:
      image: ghcr.io/gravitational/teleport-buildbox:teleport19

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare workspace
        uses: ./.github/actions/prepare-workspace

      - name: Get cache paths
        id: cache-paths
        run: |
          echo "go-build=$(go env GOCACHE)" >> $GITHUB_OUTPUT
          echo "go-mod=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT

      - name: Cache Go
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.cache-paths.outputs.go-build }}
            ${{ steps.cache-paths.outputs.go-mod }}
          key: go-build-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-build-${{ runner.os }}-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            target
            tool/fdpass-teleport/target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'tool/fdpass-teleport/Cargo.lock') }}
          restore-keys: cargo-build-${{ runner.os }}-

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Build Teleport
        run: make binaries

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: teleport-binaries
          path: |
            build/teleport
            build/tctl
            build/tsh
          retention-days: 1

  test:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.55.1-noble

    steps:
      - uses: actions/checkout@v6

      - name: Cache e2e node_modules
        uses: actions/cache@v4
        with:
          path: e2e/node_modules
          key: e2e-pnpm-${{ runner.os }}-${{ hashFiles('e2e/pnpm-lock.yaml') }}
          restore-keys: e2e-pnpm-${{ runner.os }}-

      - name: Install e2e dependencies
        working-directory: e2e
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: teleport-binaries
          path: ${{ github.workspace }}/build/

      - name: Chmod binaries
        run: |
          chmod +x build/teleport
          chmod +x build/tctl
          chmod +x build/tsh

      - name: Start Teleport
        run: e2e/run.sh

      - name: Run Tests
        working-directory: e2e
        run: pnpm test
