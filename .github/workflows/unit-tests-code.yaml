name: Unit Tests (Go)
run-name: Unit Tests (Go) - ${{ github.run_id }} - @${{ github.actor }}

on:
  push:
    branches:
      - master
      - branch/*
      - zmb3/unit-test-cargo-cache # temporary, remove prior to merge
  pull_request:
    paths:
      - '.github/workflows/unit-tests-code.yaml'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'build.assets/Makefile'
      - 'build.assets/Dockerfile*'
      - 'Makefile'
  merge_group:
    paths:
      - '.github/workflows/unit-tests-code.yaml'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'build.assets/Makefile'
      - 'build.assets/Dockerfile*'
      - 'Makefile'

jobs:
  test:
    name: Unit Tests (Go)
    if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
    runs-on: ubuntu-22.04-32core

    permissions:
      contents: read
      packages: read
      id-token: write # required for AWS credentials

    container:
      image: ghcr.io/gravitational/teleport-buildbox:teleport19
      env:
        TELEPORT_ETCD_TEST: yes
        TELEPORT_ETCD_TEST_ENDPOINT: https://etcd0:2379
        TELEPORT_XAUTH_TEST: yes
        WEBASSETS_SKIP_BUILD: 1
        # Make sure cargo downloads deps to a directory that is mounted
        # on the runner. The default ~/.cargo inside the container isn't
        # visible to @actions/cache.
        CARGO_HOME: ${{ github.workspace }}/.cargo
      options: --cap-add=SYS_ADMIN --privileged

    services:
      etcd0:
        image: ghcr.io/gravitational/ci-etcd:3.3.9
        options: >-
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --add-host etcd0:127.0.0.1
        ports:
          - 2379:2379
          - 2380:2380
          - 3379:3379

    steps:
      - name: Checkout Teleport
        uses: actions/checkout@v6

      - name: Prepare workspace
        id: prepare
        uses: ./.github/actions/prepare-workspace

      - name: Cache cargo registry and git deps
        uses: actions/cache@v5
        with:
          key: cargo-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ${{ github.workspace }}/.cargo/bin
            ${{ github.workspace }}/.cargo/registry/index/
            ${{ github.workspace }}/.cargo/registry/cache/
            ${{ github.workspace }}/.cargo/git/db/
            target/
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Mount debugfs
        run: mount -t debugfs none /sys/kernel/debug/

      - name: Run tests
        timeout-minutes: 30
        run: make -j"$(nproc)" test-go test-sh test-api

      - name: Upload test metrics
        if: always()
        continue-on-error: true # Do not fail the workflow
        uses: ./.github/actions/upload-test-metrics
