# This workflow runs Renovate to keep the Go toolchain version up to date.
# It is scheduled to run weekly and can also be triggered manually.
name: Renovate
on:
  schedule:
    - cron: '0 7 * * 3' # Every Wednesday at 7 AM UTC
  workflow_dispatch: {}

# Renovate authenticates with a GitHub App installation token. The default
# GitHub token is only used to read the repository contents for checkout.
permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.PUBLIC_RENOVATE_GHA_APP_ID }}
          private-key: ${{ secrets.PUBLIC_RENOVATE_GHA_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420 # v46.1.7
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM_COMMIT: 'true'
        with:
          configurationFile: .github/renovate.json
          token: ${{ steps.generate_token.outputs.token }}
