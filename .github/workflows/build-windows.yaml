name: Build on Windows
run-name: Build on Windows

on:
  pull_request:
    paths:
      - ".github/workflows/build-windows.yaml"
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "build.assets/Makefile"
      - "build.assets/Dockerfile*"
      - "Makefile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "lib/srv/desktop/rdp/decoder/Cargo.toml"
      - "lib/srv/desktop/rdp/decoder/src/**.rs"

jobs:
  build:
    name: Build on Windows
    if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
    runs-on: windows-2022-16core

    permissions:
      contents: read

    steps:
      - name: Checkout Teleport
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Setup Rust
        run: |
          $RustVersion = $(make --no-print-directory -C "build.assets" print-rust-version).Trim()
          . "build.assets/windows/build.ps1"
          Install-Rust -RustVersion "$RustVersion" -ToolchainDir "C:\toolchains"

      - name: Build
        shell: bash
        run: |
          export OS="windows"
          make build/tsh build/tctl build/tbot
