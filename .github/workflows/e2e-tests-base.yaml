name: E2E Tests (Base)

on:
  workflow_call:
    inputs:
      oss-repository:
        description: 'OSS repository to checkout (leave empty for current repo)'
        type: string
        default: ''
      enterprise-path:
        description: 'Path to checkout enterprise repo into (leave empty to skip)'
        type: string
        default: ''
      build-dir:
        description: 'Directory containing built binaries'
        type: string
        required: true
      e2e-dir:
        description: 'Directory containing e2e tests'
        type: string
        required: true
      build-logs-dir:
        description: 'Directory containing build logs'
        type: string
        required: true
      type-check-package:
        description: 'pnpm package name for e2e type-check'
        type: string
        required: true
      build-command:
        description: 'Command to build Teleport binaries'
        type: string
        required: true
      license-file:
        description: 'Path to license file for test runner (leave empty for none)'
        type: string
        default: ''

jobs:
  build:
    name: Build Teleport
    runs-on: ubuntu-22.04-16core
    timeout-minutes: 30

    permissions:
      contents: read

    outputs:
      playwright-version: ${{ steps.playwright-version.outputs.version }}

    container:
      image: ghcr.io/gravitational/teleport-buildbox:teleport19

    steps:
      - name: Checkout OSS
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.oss-repository || github.repository }}
          ref: ${{ inputs.oss-repository && (github.event.pull_request.base.ref || github.event.merge_group.base_ref) || '' }}
          fetch-depth: 1

      - name: Checkout Enterprise
        if: ${{ inputs.enterprise-path != '' }}
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.enterprise-path }}
          fetch-depth: 1

      - name: Prepare workspace
        uses: ./.github/actions/prepare-workspace

      - name: Get go mod cache path
        id: cache-paths
        run: echo "go-mod=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT

      - name: Install node modules
        run: pnpm install --frozen-lockfile

      - name: Type-check e2e tests
        run: pnpm --filter=${{ inputs.type-check-package }} type-check

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
        working-directory: e2e

      - name: Restore Go module cache
        id: go-mod-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.cache-paths.outputs.go-mod }}
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-mod-${{ runner.os }}-

      - name: Check generated files are up to date
        working-directory: e2e/runner
        env:
          GOWORK: off
        run: |
          go generate ./...
          if ! git diff --quiet -- ../helpers/fixtures.ts; then
            echo "::error::e2e/helpers/fixtures.ts is out of date. Run 'go generate ./...' from e2e/runner and commit the result."
            git diff -- ../helpers/fixtures.ts
            exit 1
          fi

      - name: Restore Rust output cache
        id: rust-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            web/packages/shared/libs/ironrdp/pkg
            target/x86_64-unknown-linux-gnu/release/librdp_client.a
            lib/srv/desktop/rdp/rdpclient/librdpclient.h
          key: rust-output-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', '**/Cargo.toml', 'Makefile', 'build.assets/Makefile',
            'build.assets/versions.mk', 'rust-toolchain.toml', 'lib/srv/desktop/rdp/rdpclient/**/*.rs', 'crates/**/*.rs', 'web/packages/shared/libs/ironrdp/**/*.rs') }}

      - name: Build Teleport, tctl, and tsh
        run: ${{ inputs.build-command }}
        env:
          IRONRDP_SKIP_BUILD: ${{ steps.rust-cache.outputs.cache-hit == 'true' && '1' || '0' }}
          RDPCLIENT_SKIP_CARGO: ${{ steps.rust-cache.outputs.cache-hit == 'true' && '1' || '0' }}

      - name: Print build logs
        if: failure()
        run: |
          for log in ${{ inputs.build-logs-dir }}/*.log; do
            echo "::group::$(basename "$log" .log) build log"
            cat "$log"
            echo "::endgroup::"
          done

      - name: Build e2e runner
        env:
          GOWORK: off
        run: cd e2e/runner && go build -o e2e .

      - name: Build Connect
        run: pnpm --filter=@gravitational/teleterm build
        env:
          IRONRDP_SKIP_BUILD: ${{ steps.rust-cache.outputs.cache-hit == 'true' && '1' || '0' }}

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: teleport-binaries
          path: |
            ${{ inputs.build-dir }}/teleport
            ${{ inputs.build-dir }}/tctl
            ${{ inputs.build-dir }}/tsh-e2e-webauthnmock
            e2e/runner/e2e
            web/packages/teleterm/build/
          retention-days: 1

      - name: Save Go module cache
        if: github.event_name == 'push' && steps.go-mod-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.cache-paths.outputs.go-mod }}
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Save Rust output cache
        if: github.event_name == 'push' && steps.rust-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            web/packages/shared/libs/ironrdp/pkg
            target/x86_64-unknown-linux-gnu/release/librdp_client.a
            lib/srv/desktop/rdp/rdpclient/librdpclient.h
          key: rust-output-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', '**/Cargo.toml', 'Makefile', 'build.assets/Makefile',
            'build.assets/versions.mk', 'rust-toolchain.toml', 'lib/srv/desktop/rdp/rdpclient/**/*.rs', 'crates/**/*.rs', 'web/packages/shared/libs/ironrdp/**/*.rs') }}

  test:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-22.04-8core
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      HOME: /root
      E2E_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    container:
      image: mcr.microsoft.com/playwright:v${{ needs.build.outputs.playwright-version }}-noble
      options: --init --ipc=host
      env:
        DOCKER_HOST: tcp://docker:2375

    services:
      docker:
        image: docker:dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""
        ports:
          - 2375:2375

    steps:
      - name: Checkout OSS
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.oss-repository || github.repository }}
          ref: ${{ inputs.oss-repository && (github.event.pull_request.base.ref || github.event.merge_group.base_ref) || '' }}
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout Enterprise
        if: ${{ inputs.enterprise-path != '' }}
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.enterprise-path }}
          fetch-depth: 1
          persist-credentials: false

      - name: Install Docker CLI
        run: |
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
          apt-get update && apt-get install -y docker-ce-cli

      - name: Setup e2e environment
        shell: bash
        run: |
          set -o pipefail
          for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break || sleep 1; done
          docker info >/dev/null 2>&1 || { echo "Docker failed to start"; exit 1; }
          mkdir -p setup-logs
          docker pull debian:bookworm-slim 2>&1 | tee setup-logs/docker-pull.log & pid_docker=$!

          corepack enable
          pnpm install --frozen-lockfile 2>&1 | tee setup-logs/pnpm-install.log & pid_pnpm=$!

          failed=0
          wait $pid_docker || { echo "::error::docker pull failed with exit code $?"; failed=1; }
          wait $pid_pnpm   || { echo "::error::pnpm install failed with exit code $?"; failed=1; }
          exit $failed

      - name: Upload setup logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: setup-logs
          path: setup-logs/
          retention-days: 7

      - uses: actions/download-artifact@v8
        with:
          name: teleport-binaries
          path: ${{ github.workspace }}

      - name: Chmod binaries
        run: |
          chmod +x ${{ inputs.build-dir }}/teleport
          chmod +x ${{ inputs.build-dir }}/tctl
          chmod +x ${{ inputs.build-dir }}/tsh-e2e-webauthnmock
          chmod +x e2e/runner/e2e

      - name: Create Docker config
        run: mkdir -p ~/.docker && echo '{}' > ~/.docker/config.json

      - name: Run tests
        run: >-
          xvfb-run e2e/runner/e2e --no-build
          ${{ inputs.license-file && format('--license-file {0}', inputs.license-file) || '' }}
        env:
          E2E_DIR: ${{ github.workspace }}/${{ inputs.e2e-dir }}
          E2E_SHARED_DIR: ${{ github.workspace }}/e2e
          E2E_CALLER_DIR: ${{ github.workspace }}
          TELEPORT_BIN: ${{ github.workspace }}/${{ inputs.build-dir }}/teleport
          TCTL_BIN: ${{ github.workspace }}/${{ inputs.build-dir }}/tctl

      - name: Publish GitHub report
        if: ${{ !cancelled() }}
        run: e2e/runner/e2e --github-report
        env:
          E2E_DIR: ${{ github.workspace }}/${{ inputs.e2e-dir }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ${{ inputs.e2e-dir }}/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ${{ inputs.e2e-dir }}/test-results/
          retention-days: 7

      - name: Upload Teleport logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: teleport-logs
          path: ${{ inputs.e2e-dir }}/teleport-*.log
          retention-days: 7

      - name: Upload Docker node logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: docker-node-logs
          path: ${{ inputs.e2e-dir }}/docker-node-*.log
          retention-days: 7
