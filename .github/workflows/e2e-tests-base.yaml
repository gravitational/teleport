# Reusable workflow to run e2e tests against binaries produced by
# e2e-build.yaml. The caller shoud run the build job first and pass its
# playwright-version output here.

name: E2E Tests (Base)

on:
  workflow_call:
    inputs:
      oss-repository:
        description: "OSS repository to checkout (leave empty for current repo)"
        type: string
        default: ""
      enterprise-path:
        description: "Path to checkout enterprise repo into (leave empty to skip)"
        type: string
        default: ""
      build-dir:
        description: "Directory containing built binaries (must match the build workflow)"
        type: string
        required: true
      e2e-dir:
        description: "Directory containing e2e tests"
        type: string
        required: true
      playwright-version:
        description: "Playwright version (from the build workflow output), for the container image"
        type: string
        required: true
      license-file:
        description: "Path to a committed license file for the runner (leave empty for none)"
        type: string
        default: ""
      test-path:
        description: "Specific test file/dir to run (empty = full suite)"
        type: string
        default: ""
      no-resource-setup:
        description: "Pass --no-resource-setup to the runner (skip applying config/resources)"
        type: boolean
        default: false
      cloud-hostport:
        description: "If set, exports TELEPORT_CLOUD_HOSTPORT (Cloud API host:port) for the run"
        type: string
        default: ""

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-22.04-8core
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      HOME: /root
      E2E_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    container:
      image: mcr.microsoft.com/playwright:v${{ inputs.playwright-version }}-noble
      options: --init --ipc=host
      env:
        DOCKER_HOST: tcp://docker:2375

    services:
      docker:
        image: docker:dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""
        ports:
          - 2375:2375

    steps:
      - name: Checkout OSS
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.oss-repository || github.repository }}
          ref: ${{ inputs.oss-repository && (github.event.pull_request.base.ref || github.event.merge_group.base_ref) || '' }}
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout Enterprise
        if: ${{ inputs.enterprise-path != '' }}
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.enterprise-path }}
          fetch-depth: 1
          persist-credentials: false

      - name: Install Docker CLI
        run: |
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
          apt-get update && apt-get install -y docker-ce-cli

      - name: Setup e2e environment
        shell: bash
        run: |
          set -o pipefail
          for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break || sleep 1; done
          docker info >/dev/null 2>&1 || { echo "Docker failed to start"; exit 1; }
          mkdir -p setup-logs
          docker pull debian:bookworm-slim 2>&1 | tee setup-logs/docker-pull.log & pid_docker=$!

          corepack enable
          pnpm install --frozen-lockfile 2>&1 | tee setup-logs/pnpm-install.log & pid_pnpm=$!

          failed=0
          wait $pid_docker || { echo "::error::docker pull failed with exit code $?"; failed=1; }
          wait $pid_pnpm   || { echo "::error::pnpm install failed with exit code $?"; failed=1; }
          exit $failed

      - name: Upload setup logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: setup-logs
          path: setup-logs/
          retention-days: 7

      - uses: actions/download-artifact@v8
        with:
          name: teleport-binaries
          path: ${{ github.workspace }}

      - name: Chmod binaries
        run: |
          chmod +x ${{ inputs.build-dir }}/teleport
          chmod +x ${{ inputs.build-dir }}/tctl
          chmod +x ${{ inputs.build-dir }}/tsh-e2e-webauthnmock
          chmod +x e2e/runner/e2e

      - name: Create Docker config
        run: mkdir -p ~/.docker && echo '{}' > ~/.docker/config.json

      - name: Run tests
        env:
          LICENSE_FILE: ${{ inputs.license-file }}
          TEST_PATH: ${{ inputs.test-path }}
          NO_RESOURCE_SETUP: ${{ inputs.no-resource-setup }}
          E2E_DIR: ${{ github.workspace }}/${{ inputs.e2e-dir }}
          E2E_SHARED_DIR: ${{ github.workspace }}/e2e
          E2E_CALLER_DIR: ${{ github.workspace }}
          TELEPORT_BIN: ${{ github.workspace }}/${{ inputs.build-dir }}/teleport
          TCTL_BIN: ${{ github.workspace }}/${{ inputs.build-dir }}/tctl
          TELEPORT_CLOUD_HOSTPORT: ${{ inputs.cloud-hostport }}
        run: |
          args=(--no-build)
          [ "$NO_RESOURCE_SETUP" = "true" ] && args+=(--no-resource-setup)
          [ -n "$LICENSE_FILE" ] && args+=(--license-file "$LICENSE_FILE")
          [ -n "$TEST_PATH" ] && args+=("$TEST_PATH")
          xvfb-run e2e/runner/e2e "${args[@]}"

      - name: Publish GitHub report
        if: ${{ !cancelled() }}
        run: e2e/runner/e2e --github-report
        env:
          E2E_DIR: ${{ github.workspace }}/${{ inputs.e2e-dir }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ${{ inputs.e2e-dir }}/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ${{ inputs.e2e-dir }}/test-results/
          retention-days: 7

      - name: Upload Teleport logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: teleport-logs
          path: ${{ inputs.e2e-dir }}/teleport-*.log
          retention-days: 7

      - name: Upload Docker node logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: docker-node-logs
          path: ${{ inputs.e2e-dir }}/docker-node-*.log
          retention-days: 7
