name: Lint (Terraform)

on:
  pull_request:
    paths:
      - '**.tf'
      - '**.tf.json'
      - '**.hcl'
  merge_group:
    paths:
      - '**.tf'
      - '**.tf.json'
      - '**.hcl'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  terraform-lint:
    uses: gravitational/shared-workflows/.github/workflows/terraform-lint.yaml@02af65890b521ecdf79856c00f6d2c875bf40ea3 # workflows/v0.0.5
    with:
      # TODO: Fix Terraform linting issues and stop using force to pass the job.
      tflint_force: true
      tflint_config_path: $GITHUB_WORKSPACE/.tflint.hcl
      # TODO(gavin): update shared-workflow version to lint module docs 
      # terraform_docs_config_path: $GITHUB_WORKSPACE/integrations/terraform-modules/.terraform-docs.yml
      # terraform_docs_find_dir: $GITHUB_WORKSPACE/integrations/terraform-modules
    permissions:
      actions: read
      contents: read
      pull-requests: write
