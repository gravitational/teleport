# The changelog workflow checks that a PR message has a line of the form
# `changelog: <text>` or a `no-changelog` label. If neither are present,
# the workflow run will fail, and as this workflow job is a required check,
# the PR cannot be merged.
name: Validate changelog entry
on:
  pull_request:
    types:
      - edited
      - labeled
      - opened
      - ready_for_review
      - reopened
      - synchronize
      - unlabeled

permissions:
  pull-requests: write

jobs:
  validate-changelog:
    name: Validate the changelog entry
    if: ${{ !startsWith(github.head_ref, 'dependabot/') && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      # Checkout main branch of shared-workflow repository.
      - name: Checkout shared-workflow
        uses: actions/checkout@v6
        with:
          repository: gravitational/shared-workflows
          path: .github/shared-workflows
          ref: dd8f30e8fd5dd1d1655b9d27049e5d0f6f4f9ef2 # workflows/v0.0.3
      - name: Installing Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - name: Validate the changelog entry
        run: cd .github/shared-workflows/bot && go run main.go -workflow=changelog -token="${{ secrets.GITHUB_TOKEN }}" -reviewers="${{ secrets.reviewers }}"
      # Extract changelog using intermediate variables to avoid injection attacks.
      # https://docs.github.com/en/actions/reference/security/secure-use#use-an-intermediate-environment-variable
      - name: Extract changelog entries
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          {
            echo 'entries<<EOF'
            grep -iE '^changelog: ' <<< "$BODY" | sed 's/^[Cc]hangelog: //'
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Checkout cspell dependencies
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            package.json
            docs/cspell.json
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@dda4788290998366da86b6a4f497909644397bb2 # v6.0.0
        with:
          node-version: 24
      - name: Spellcheck changelog
        run: |
          VERSION=$(jq -r '.devDependencies.cspell // .dependencies.cspell' package.json | tr -d '^~>=< ')
          npx -y "cspell@${VERSION}" lint --no-progress --config docs/cspell.json stdin <<< "${{ steps.changelog.outputs.entries }}"
