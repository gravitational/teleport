openapi: 3.0.0
info:
  title: Graph API
  version: 1.0.0
paths: { }
# This file contains the models for the graph API
# Path is left empty as some parsers require it to be present
components:
  schemas:
    Operation:
      type: object
      required:
        - op
      properties:
        op:
          type: string
          enum: [ add, remove, replace, move, copy, test ]
        path:
          type: string
        from:
          type: string
        value:
          type: object
          x-go-type: any
      discriminator:
        propertyName: op
        mapping:
          add: '#/components/schemas/AddOperation'
          remove: '#/components/schemas/RemoveOperation'
          replace: '#/components/schemas/ReplaceOperation'
          move: '#/components/schemas/MoveOperation'
          copy: '#/components/schemas/CopyOperation'
          test: '#/components/schemas/TestOperation'

    AddOperation:
      allOf:
        - $ref: '#/components/schemas/Operation'
        - type: object
          required:
            - path
            - value

    RemoveOperation:
      allOf:
        - $ref: '#/components/schemas/Operation'
        - type: object
          required:
            - path

    ReplaceOperation:
      allOf:
        - $ref: '#/components/schemas/Operation'
        - type: object
          required:
            - path
            - value

    MoveOperation:
      allOf:
        - $ref: '#/components/schemas/Operation'
        - type: object
          required:
            - path
            - from

    CopyOperation:
      allOf:
        - $ref: '#/components/schemas/Operation'
        - type: object
          required:
            - path
            - from

    TestOperation:
      allOf:
        - $ref: '#/components/schemas/Operation'
        - type: object
          required:
            - path
            - value

    JsonPatch:
      type: array
      items:
        $ref: '#/components/schemas/Operation'
      minItems: 1
