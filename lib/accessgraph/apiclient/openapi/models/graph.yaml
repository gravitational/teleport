openapi: 3.0.0
info:
  title: Graph API
  version: 1.0.0
paths: {}
# This file contains the models for the graph API
# Path is left empty as some parsers require it to be present
components:
  schemas:
    Graph:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/Edge'
    Node:
      type: object
      required:
        - id
        - kind
        - sub_kind
        - name
        - properties
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum:
            - action
            - merged_action # MergedActions are only created by the frontend, this is for easier type checking
            - dummy # Same as action, but used for dummy nodes
            - resource
            - identity_group
            - resource_group
            - identity
            - sub_resource
        sub_kind:
          type: string
        name:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        properties:
          oneOf:
            - $ref: '#/components/schemas/ActionProperties'
            - $ref: '#/components/schemas/DummyNodeProperties'
            - $ref: '#/components/schemas/MergedActionProperties'
            - $ref: '#/components/schemas/ResourceProperties'
            - $ref: '#/components/schemas/IdentityGroupProperties'
            - $ref: '#/components/schemas/ResourceGroupProperties'
            - $ref: '#/components/schemas/IdentityProperties'
            - $ref: '#/components/schemas/SubResourceProperties'
            - $ref: '#/components/schemas/AuthorizedKeyProperties'
            - $ref: '#/components/schemas/PrivateKeyProperties'
            - $ref: '#/components/schemas/DeviceProperties'
            - $ref: '#/components/schemas/HostUserProperties'
            - $ref: '#/components/schemas/RequestAccessProperties'
            - $ref: '#/components/schemas/ReviewAccessProperties'
            - $ref: '#/components/schemas/DatabaseObjectProperties'
    Edge:
      type: object
      required:
        - from
        - to
        - edge_type
        - id
      properties:
        id:
          description: The unique identifier of the edge computed from EdgeKind, From and To
          type: string
          format: uuid
        from:
          type: string
          format: uuid
        to:
          type: string
          format: uuid
        edge_type:
          type: string
        properties:
          oneOf:
            - $ref: '#/components/schemas/EdgeTeleportProperties'
    ActionProperties:
      type: object
      required:
        - origin_type
        - type
      properties:
        source:
          type: string
        type:
          type: string
        origin_type:
          type: string
        hash:
          type: string
        properties:
          oneOf:
            - $ref: '#/components/schemas/ActionTeleportProperties'
            - $ref: '#/components/schemas/ActionAWSProperties'
            - $ref: '#/components/schemas/ActionAzureProperties'
            - $ref: '#/components/schemas/ActionGitlabProperties'
            - $ref: '#/components/schemas/ActionOktaProperties'
            - $ref: '#/components/schemas/ActionGithubProperties'
    # ActionGroups are only created by the frontend, this is for easier type checking
    MergedActionProperties:
      type: object
      required:
        - type
        - source
        - nodes
        - origin_type
      properties:
        origin_type:
          type: string
        hash:
          type: string
        type:
          type: string
        source:
          type: string
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/Node'
    DummyNodeProperties:
      type: object
      required:
        - origin_type
        - source
      properties:
        origin_type:
          type: string
        source:
          type: string
    ActionAWSProperties:
      type: object
      properties:
        scope:
          type: string
        action_mask:
          type: array
          items:
            type: string
        account_id:
          type: string
        resource_mask:
          type: array
          items:
            type: string
    ActionAzureProperties:
      type: object
      properties:
        subscription_id:
          type: string
        actions:
          type: array
          items:
            type: string
        scope:
          type: string
    ActionOktaProperties:
      type: object
      properties:
        role_type:
          type: string
    ActionGithubProperties:
      type: object
      properties:
        role_name:
          type: string
    ActionGitlabProperties:
      type: object
      properties:
        access_level:
          type: string
        derived_from_user:
          type: string
    ActionTeleportProperties:
      type: object
      properties:
        disconnect_expired_cert:
          type: boolean
        max_session_ttl:
          type: string
          format: duration
        pin_source_ip:
          type: boolean
        require_mfa_type:
          type: string
        ssh:
          $ref: '#/components/schemas/ActionSSHProperties'
        kubernetes:
          $ref: '#/components/schemas/ActionKubernetesProperties'
        database:
          $ref: '#/components/schemas/ActionDatabaseProperties'
        app:
          $ref: '#/components/schemas/ActionAppProperties'
        desktop:
          $ref: '#/components/schemas/ActionDesktopProperties'
    ActionSSHProperties:
      type: object
      properties:
        permit_agent_forwarding:
          type: boolean
        permit_port_forwarding:
          type: boolean
        permit_x11_forwarding:
          type: boolean
        logins:
          type: array
          items:
            type: string
    ActionKubernetesProperties:
      type: object
      properties:
        kubernetes_users:
          type: array
          items:
            type: string
        kubernetes_groups:
          type: array
          items:
            type: string
        kubernetes_resources:
          type: array
          items:
            $ref: '#/components/schemas/KubernetesResource'
    KubernetesResource:
      type: object
      required:
        - kind
        - name
        - namespace
        - verbs
      properties:
        kind:
          type: string
        name:
          type: string
        namespace:
          type: string
        verbs:
          type: array
          items:
            type: string
    ActionDatabaseProperties:
      type: object
      properties:
        database_users:
          type: array
          items:
            type: string
        database_names:
          type: array
          items:
            type: string
        database_roles:
          type: array
          items:
            type: string
    ActionAppProperties:
      type: object
      properties:
        aws_role_arns:
          type: array
          items:
            type: string
        azure_identities:
          type: array
          items:
            type: string
        gcp_service_accounts:
          type: array
          items:
            type: string
    ActionDesktopProperties:
      type: object
      properties:
        logins:
          type: array
          items:
            type: string
    ResourceProperties:
      type: object
      required:
        - origin_type
      properties:
        alias:
          type: string
        hostname:
          type: string
        source:
          type: string
        origin:
          type: string
        origin_type:
          type: string
        properties:
          oneOf:
            - $ref: '#/components/schemas/ResourceTeleportProperties'
            - $ref: '#/components/schemas/ResourceAWSProperties'
            - $ref: '#/components/schemas/ResourceAzureProperties'
            - $ref: '#/components/schemas/ResourceGitlabProperties'
            - $ref: '#/components/schemas/ResourceNetIQProperties'
            - $ref: '#/components/schemas/ResourceOktaProperties'
            - $ref: '#/components/schemas/ResourceGithubProperties'
    ResourceTeleportProperties:
      type: object
    ResourceAWSProperties:
      type: object
      properties:
        arn:
          type: string
        account_id:
          type: string
        region:
          type: string
        name:
          type: string
        status:
          type: string
        launch_time:
          type: string
          format: date-time
        properties:
          oneOf:
            - $ref: '#/components/schemas/ResourceAWSPropertiesEC2'
            - $ref: '#/components/schemas/ResourceAWSPropertiesRDS'
            - $ref: '#/components/schemas/ResourceAWSPropertiesS3'
            - $ref: '#/components/schemas/ResourceAWSPropertiesKMS'
            - $ref: '#/components/schemas/ResourceAWSPropertiesEKS'
    ResourceAWSPropertiesEKS:
      type: object
      properties:
        version:
          type: string
        cluster_name:
          type: string
    ResourceNetIQProperties:
      type: object
      properties:
        cn:
          type: string
        description:
          type: string
        categories:
          type: array
          items:
            $ref: '#/components/schemas/NetIQCategory'
    NetIQCategory:
      type: object
      properties:
        name:
          type: string
        id:
          type: string
    ResourceAWSPropertiesRDS:
      type: object
      properties:
        is_cluster:
          type: boolean
        engine:
          type: string
        engine_version:
          type: string
        resource_id:
          type: string
    ResourceAWSPropertiesEC2:
      type: object
      properties:
        instance_id:
          type: string
        hostname:
          type: string
        iam_instance_profile_arn:
          type: string
        launch_key:
          type: string
    ResourceAWSPropertiesS3:
      type: object
      properties:
        policy_document:
          type: string
        is_public:
          type: boolean
        s3_acls:
          type: string
    ResourceAWSPropertiesKMS:
      type: object
      properties:
        policy_document:
          type: string
        hsm_cluster_id:
          type: string
        multi_region:
          type: string
        aliases:
          type: array
          items:
            type: string
    ResourceAzureProperties:
      type: object
      properties:
        id:
          type: string
        subscription_id:
          type: string
        properties:
          oneOf:
            - $ref: '#/components/schemas/ResourceAzurePropertiesVM'
    ResourceAzurePropertiesVM:
      type: object
      properties:
        location:
          type: string
    ResourceGitlabProperties:
      type: object
      properties:
        project_name:
          type: string
        project_path:
          type: string
        project_description:
          type: string
    ResourceOktaProperties:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
    ResourceGithubProperties:
      type: object
      properties:
        name:
          type: string
        org_name:
          type: string
        type:
          type: string
    SubResourceProperties:
      type: object
      required:
        - origin_type
      properties:
        alias:
          type: string
        source:
          type: string
        origin_type:
          type: string
    AuthorizedKeyProperties:
      type: object
      required:
        - origin_type
      properties:
        alias:
          type: string
        source:
          type: string
        origin_type:
          type: string
        key_type:
          type: string
        fingerprint:
          type: string
        name:
          type: string
        key_comment:
          type: string
    PrivateKeyProperties:
      type: object
      required:
        - origin_type
      properties:
        source:
          type: string
        origin_type:
          type: string
        key_mode:
          type: string
        fingerprint:
          type: string
        name:
          type: string
    HostUserProperties:
      type: object
      required:
        - origin_type
      properties:
        source:
          type: string
        origin_type:
          type: string
    DeviceProperties:
      type: object
      required:
        - origin_type
      properties:
        source:
          type: string
        origin_type:
          type: string
        serial_number:
          type: string
        device_os:
          type: string
        alias:
          type: string
        enroll_status:
          type: string
        model_identifier:
          type: string
        os_build:
          type: string
        os_version:
          type: string
        source_name:
          type: string
        source_origin:
          type: string
        owner:
          type: string
    IdentityGroupProperties:
      type: object
      required:
        - origin_type
      properties:
        source:
          type: string
        alias:
          type: string
        origin:
          type: string
        origin_type:
          type: string
        hash:
          type: string
        temporary:
          type: boolean
        properties:
          oneOf:
            - $ref: '#/components/schemas/IdentityGroupTeleportProperties'
            - $ref: '#/components/schemas/IdentityGroupAWSProperties'
            - $ref: '#/components/schemas/IdentityGroupAzureProperties'
            - $ref: '#/components/schemas/IdentityGroupEntraProperties'
            - $ref: '#/components/schemas/IdentityGroupNetIQProperties'
    IdentityGroupNetIQProperties:
      type: object
      properties:
        cn:
          type: string
        description:
          type: string
    ResourceGroupProperties:
      type: object
      required:
        - origin_type
      properties:
        source:
          type: string
        origin_type:
          type: string
        hash:
          type: string
        temporary:
          type: boolean
        properties:
          oneOf:
            - $ref: '#/components/schemas/ResourceGroupTeleportProperties'
            - $ref: '#/components/schemas/ResourceGroupAWSProperties'
            - $ref: '#/components/schemas/ResourceGroupAzureProperties'
            - $ref: '#/components/schemas/ResourceGroupGitlabProperties'
            - $ref: '#/components/schemas/ResourceGroupNetIQProperties'
    IdentityProperties:
      type: object
      required:
        - origin_type
      properties:
        source:
          type: string
        standing_privileges:
          type: integer
          format: int64
        origin:
          type: string
        is_crown_jewel:
          type: boolean
        origin_type:
          type: string
        traits:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        properties:
          oneOf:
            - $ref: '#/components/schemas/IdentityAWSProperties'
            - $ref: '#/components/schemas/IdentityAzureProperties'
            - $ref: '#/components/schemas/IdentityGitlabProperties'
            - $ref: '#/components/schemas/IdentityEntraProperties'
            - $ref: '#/components/schemas/IdentityNetIQProperties'
            - $ref: '#/components/schemas/IdentityOktaProperties'
            - $ref: '#/components/schemas/IdentityGithubProperties'
    IdentityNetIQProperties:
      type: object
      properties:
        cn:
          type: string
        email:
          type: string
        name:
          type: string
        is_disabled:
          type: boolean
    IdentityAWSProperties:
      type: object
      properties:
        arn:
          type: string
        account_id:
          type: string
        path:
          type: string
        id:
          type: string
        username:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        password_last_used:
          type: string
          format: date-time
        region:
          type: string
        instance_id:
          type: string
        permissions_boundary_arn:
          type: string
        iam_instance_profile_arn:
          type: string
        is_external_sso:
          type: boolean
    IdentityAzureProperties:
      type: object
      properties:
        id:
          type: string
        subscription_id:
          type: string
        display_name:
          type: string
        object_type:
          type: string
    IdentityGitlabProperties:
      type: object
      properties:
        email:
          type: string
          description: Email is the email of the user.
        name:
          type: string
          description: Name is the name of the user.
        is_admin:
          type: boolean
          description: IsAdmin is true if the user is an admin.
        organization:
          type: string
          description: Organization is the organization of the user.
        last_sign_in_at:
          type: string
          format: date-time
          description: LastSignInAt is the last time the user signed in.
        can_create_group:
          type: boolean
          description: CanCreateGroup is true if the user can create a group.
        can_create_project:
          type: boolean
          description: CanCreateProject is true if the user can create a project.
        two_factor_enabled:
          type: boolean
          description: TwoFactorEnabled is true if the user has two-factor authentication enabled.
        identities:
          type: array
          items:
            $ref: '#/components/schemas/GitlabUserIdentity'
          description: Identities is original identity when user was imported.
    IdentityOktaProperties:
      type: object
      properties:
        id:
          type: string
          description: The Okta identity ID
        type:
          type: string
          description: The type of Okta identity (e.g. "token")
        token_type:
          type: string
          description: The Okta token type
        name:
          type: string
          description: Name of the Okta identity
        owner_id:
          type: string
          description: Owner ID of the Okta identity (i.e. token owner)
    IdentityGithubProperties:
      type: object
      properties:
        id:
          type: string
          description: The Github identity ID
        type:
          type: string
          description: The type of Okta identity (e.g. "token")
        name:
          type: string
          description: Name of the Github identity
        owner_id:
          type: string
          description: Owner ID of the Github identity (i.e. token owner)
        org_name:
          type: string
          description: The Github organization the identity belongs to
    ReviewAccessProperties:
      type: object
      required:
        - origin_type
      properties:
        source:
          type: string
        origin_type:
          type: string
        type:
          type: string
        hash:
          type: string
    RequestAccessProperties:
      type: object
      required:
        - origin_type
      properties:
        source:
          type: string
        origin_type:
          type: string
        type:
          type: string
        hash:
          type: string
    GitlabUserIdentity:
      type: object
      properties:
        provider:
          type: string
        extern_uid:
          type: string
    IdentityEntraProperties:
      type: object
      properties:
        id:
          type: string
        upn:
          type: string
          description: UPN is the user principal name in the Entra directory
        sam_account_name:
          type: string
        tenant_id:
          type: string
    ResourceGroupAWSProperties:
      type: object
      properties:
        arn_mask:
          type: string
        account_id:
          type: string
    ResourceGroupAzureProperties:
      type: object
      properties:
        scope:
          type: string
        resource:
          type: string
        subscription_id:
          type: string
    ResourceGroupGitlabProperties:
      type: object
      properties:
        project_name:
          type: string
        project_path:
          type: string
        project_description:
          type: string
    ResourceGroupNetIQProperties:
      type: object
      properties:
        cn:
          type: string
        description:
          type: string
        categories:
          type: array
          items:
            $ref: '#/components/schemas/NetIQCategory'
        level:
          type: object
          properties:
            name:
              type: string
            level:
              type: integer
    ResourceGroupTeleportProperties:
      type: object
      properties:
        resource_kind:
          type: string
        matching_labels:
          type: object
          additionalProperties:
            type: string
        access_request_id:
          type: string
    IdentityGroupEntraProperties:
      type: object
      properties:
        name:
          type: string
        tenant_id:
          type: string
        id:
          type: string
    IdentityGroupAWSProperties:
      type: object
      properties:
        arn:
          type: string
        account_id:
          type: string
        path:
          type: string
        id:
          type: string
        name:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        max_session_ttl:
          type: string
          format: duration
    IdentityGroupAzureProperties:
      type: object
      properties:
        subscription_id:
          type: string
        id:
          type: string
        scope:
          type: string
    IdentityGroupTeleportProperties:
      type: object
      properties:
        access_request_id:
          type: string
        description:
          type: string
        traits_templates:
          $ref: '#/components/schemas/IdentityGroupTeleportPropertiesValues'
        traits_values:
          $ref: '#/components/schemas/IdentityGroupTeleportPropertiesValues'
    IdentityGroupTeleportPropertiesValues:
      type: object
      properties:
        allow:
          $ref: '#/components/schemas/IdentityGroupTeleportPropertiesCond'
        deny:
          $ref: '#/components/schemas/IdentityGroupTeleportPropertiesCond'
    IdentityGroupTeleportPropertiesCond:
      type: object
      properties:
        logins:
          type: array
          items:
            type: string
        node_labels:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        kubernetes_users:
          type: array
          items:
            type: string
        kubernetes_groups:
          type: array
          items:
            type: string
        kubernetes_labels:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        database_users:
          type: array
          items:
            type: string
        database_names:
          type: array
          items:
            type: string
        database_roles:
          type: array
          items:
            type: string
        database_labels:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        aws_role_arns:
          type: array
          items:
            type: string
        gcp_service_accounts:
          type: array
          items:
            type: string
        azure_identities:
          type: array
          items:
            type: string
        app_labels:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        windows_desktop_logins:
          type: array
          items:
            type: string
        windows_desktop_labels:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    DatabaseObjectProperties:
      type: object
      required:
        - origin_type
      properties:
        source:
          type: string
        object_kind:
          type: string
        database:
          type: string
        database_service_name:
          type: string
        protocol:
          type: string
        schema:
          type: string
        origin_type:
          type: string
    EdgeTeleportProperties:
      type: object
      properties:
        access_list:
          $ref: '#/components/schemas/EdgeTeleportAccessListProperties'
        database_object:
          $ref: '#/components/schemas/EdgeTeleportDatabaseObjectProperties'
    EdgeTeleportAccessListProperties:
      type: object
      required:
        - description
        - status
      properties:
        description:
          type: string
        status:
          type: string
    EdgeTeleportDatabaseObjectProperties:
      type: object
      required:
        - permissions
        - match
      properties:
        permissions:
          type: array
          items:
            type: string
        match:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
