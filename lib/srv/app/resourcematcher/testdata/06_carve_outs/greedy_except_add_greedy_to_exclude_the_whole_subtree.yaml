description: 'greedy_except: add greedy() to exclude the whole subtree'
app_resources_expressions:
    # same as greedy_without("secret"): the
    # greedy() excludes the whole subtree.
    # denies /files/secret/key
    # allows /files/public/x
    - |-
      path.match(literal("files",
          greedy_except(literal("secret", greedy()))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/secret/key
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/secret
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/public/x
      expect:
        allowed: true
    - request:
        method: GET
        path: /files
      expect:
        allowed: true
