description: 'greedy_except: exact segment, subtree still allowed'
app_resources_expression:
    # allows /files/secret/other
    # denies /files/secret
    - |-
      path.match(literal("files",
          greedy_except(literal("secret"))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/secret/other
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/secret
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/public
      expect:
        allowed: true
