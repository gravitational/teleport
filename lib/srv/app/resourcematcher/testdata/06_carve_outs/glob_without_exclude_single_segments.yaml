description: 'glob_without: exclude single segments'
app_resources_expression:
    - |-
      path.match(literal("files",
          glob_without(set("private", "secret"))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/report
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/private
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/secret
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/a/b
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
