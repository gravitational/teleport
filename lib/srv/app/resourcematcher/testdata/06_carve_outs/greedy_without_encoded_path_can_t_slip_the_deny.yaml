description: 'greedy_without: an encoded path can''t slip the deny'
app_resources_expression:
    # greedy_without grants files/** but denies the secret and private subtrees.
    # An attempt to reach secret with an encoded "s" (%73) cannot slip the deny:
    # the strict tokenizer rejects the non-separator escape outright, so the
    # request is invalid before greedy_without is even consulted.
    - |-
      path.match(literal("files",
          greedy_without("secret", "private")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/%73ecret/key
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
    - request:
        method: GET
        path: /files/secret/key
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/public/key
      expect:
        allowed: true
