description: 'greedy_without: exclude and carve out subtrees'
app_resources_expressions:
    - |-
      path.match(literal("files",
          greedy_without("secret", "private")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/reports/q3
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/private/x
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/secret
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
