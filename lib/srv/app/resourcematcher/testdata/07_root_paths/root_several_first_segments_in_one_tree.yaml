description: 'root: several first segments in one tree'
app_resources_expressions:
    - |-
      path.match(root(
          literal("api", greedy()),
          literal("admin", greedy())))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /admin/settings
      expect:
        allowed: true
    - request:
        method: GET
        path: /api/v4/users
      expect:
        allowed: true
    - request:
        method: GET
        path: /other
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
