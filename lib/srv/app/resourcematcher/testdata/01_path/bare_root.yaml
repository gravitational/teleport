description: bare root
app_resources:
    # The bare root matches only the
    # request "/".
    - paths:
        - /
app_resources_expressions:
    - |-
      path.match(
        slash())
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /
      expect:
        allowed: true
    - request:
        method: GET
        path: /foo
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /api/v4
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: POST
        path: /
      expect:
        allowed: true
