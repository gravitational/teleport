description: exact
rules:
    - paths:
        - /api/v4/health
rules_desugared:
    - pred: |-
        path.match(
          literal("api/v4/health"))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/health
      expect:
        allowed: true
    - request:
        method: HEAD
        path: /api/v4/health
      expect:
        allowed: true
    - request:
        method: GET
        path: /api/v4/health/ # trailing slash
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /api/v4
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /api/v4/health/extra
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /api/v4%2fhealth # percent encoded slash
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
