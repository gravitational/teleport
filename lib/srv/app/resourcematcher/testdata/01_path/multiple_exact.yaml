description: multiple exact
app_resources:
    - paths:
        - /api/v4/health
        - /api/v4/status
app_resources_desugared:
    - |-
      path.match(
        literal("api/v4",
          literal("health"),
          literal("status")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/status
      expect:
        allowed: true
    - request:
        method: GET
        path: /api/v4/health
      expect:
        allowed: true
    - request:
        method: GET
        path: /api/v4/other
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
