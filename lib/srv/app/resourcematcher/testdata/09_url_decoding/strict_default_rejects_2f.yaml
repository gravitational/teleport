description: strict default rejects %2F
rules:
    # url_decoding options normalize the path.
    # Default: no decode, reject every % byte.
    - paths:
        - /files/**
rules_desugared:
    - pred: |-
        path.match(
          literal("files",
            greedy()))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/a%2Fb
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
    - request:
        method: GET
        path: /files/a/b
      expect:
        allowed: true
    - request:
        method: GET
        path: /files
      expect:
        allowed: true
