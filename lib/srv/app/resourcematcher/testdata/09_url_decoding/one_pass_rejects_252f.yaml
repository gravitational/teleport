description: one pass rejects %252F
rules:
    # One pass leaves a residual % in a
    # double-encoded path, so it is rejected.
    - paths:
        - /files/{x}/*
      url_decoding:
        allow_percent: false
        decode_iterations: 1 # change to 2
rules_desugared:
    - pred: |-
        path.match(
          literal("files",
            capture("x",
              glob())),
          decode_iterations(1))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/a%252Fb
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
    - request:
        method: GET
        path: /files/a%2Fb
      expect:
        allowed: true
        vars:
            x: a
    - request:
        method: GET
        path: /files/a/b
      expect:
        allowed: true
        vars:
            x: a
