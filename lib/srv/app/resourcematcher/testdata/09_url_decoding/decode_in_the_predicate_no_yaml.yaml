description: decode in the predicate, no YAML
rules:
    # A bare predicate passes the url_decoding
    # options as call arguments, not YAML.
    - pred: |-
        path.match(literal("files",
            capture("x", glob())),
        decode_iterations(1))
rules_desugared:
    - pred: |-
        path.match(
          literal("files",
            capture("x",
              glob())),
          decode_iterations(1))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/a%2Fb
      expect:
        allowed: true
        vars:
            x: a
    - request:
        method: GET
        path: /files/a/b
      expect:
        allowed: true
        vars:
            x: a
    - request:
        method: GET
        path: /files/a
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
