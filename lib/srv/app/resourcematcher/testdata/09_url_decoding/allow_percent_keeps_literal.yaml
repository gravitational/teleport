description: allow_percent keeps literal %
rules:
    # allow_percent admits a residual %,
    # so a%2Fb stays one segment.
    - paths:
        - /files/{x}
      url_decoding:
        allow_percent: true
        decode_iterations: 0
rules_desugared:
    - pred: |-
        path.match(
          literal("files",
            capture("x")),
          allow_percent())
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/a%2Fb
      expect:
        allowed: true
        vars:
            x: a%2Fb
    - request:
        method: GET
        path: /files/plain
      expect:
        allowed: true
        vars:
            x: plain
    - request:
        method: GET
        path: /files/a/b
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
