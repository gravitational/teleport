description: decode then allow residual %
rules:
    # decode_iterations and allow_percent
    # combine: decode once, then admit any
    # leftover %.
    - paths:
        - /files/{x}
      url_decoding:
        allow_percent: true
        decode_iterations: 1
rules_desugared:
    - pred: |-
        path.match(
          literal("files",
            capture("x")),
          decode_iterations(1),
          allow_percent())
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/a%252Fb
      expect:
        allowed: true
        vars:
            x: a%2Fb
    - request:
        method: GET
        path: /files/plain
      expect:
        allowed: true
        vars:
            x: plain
    - request:
        method: GET
        path: /files/a%2Fb
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
