description: equals identity
app_resources:
    - paths:
        - /api/v4/user/{username}
      where: user.name == vars.username
app_resources_expressions:
    - |-
      path.match(
        literal("api/v4/user",
          capture("username"))) &&
      user.name == vars.username
identity:
    name: alice
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/user/alice
      expect:
        allowed: true
        vars:
            username: alice
    - request:
        method: GET
        path: /api/v4/user/bob
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
