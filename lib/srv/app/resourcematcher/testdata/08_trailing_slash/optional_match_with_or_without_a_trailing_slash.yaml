description: 'optional: match with or without a trailing slash'
app_resources_expression:
    - |-
      path.match(literal("files",
          optional(slash())))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/
      expect:
        allowed: true
    - request:
        method: GET
        path: /files
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/x
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
