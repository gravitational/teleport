description: 'slash: the bare root path /'
app_resources_expressions:
    - path.match(slash())
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /
      expect:
        allowed: true
    - request:
        method: GET
        path: /x
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
