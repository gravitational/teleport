description: 'slash: a trailing slash is required'
app_resources_expression:
    - path.match(literal("files", slash()))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/
      expect:
        allowed: true
