description: 'optional: an optional trailing subtree'
app_resources_expression:
    # The path may end at files, or carry
    # the optional reports tail, from one
    # tree with no duplicated prefix.
    - |-
      path.match(literal("files",
          optional(literal("reports"))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/reports
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/other
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/reports/q3
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
