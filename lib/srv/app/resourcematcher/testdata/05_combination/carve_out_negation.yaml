description: carve-out (negation)
app_resources_expression:
    # Allow every path, then carve out the admin subtree with a negated
    # path.match. Path matching lives in the expression, never in a sugared
    # where, so the grant and the carve-out share one predicate.
    - |-
      path.match(greedy()) &&
      !path.match(literal("admin", greedy()))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/users
      expect:
        allowed: true
    - request:
        method: GET
        path: /admin/users
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /admin
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
