description: additive list (two rules)
app_resources:
    - paths:
        - /public/**
    - paths:
        - /static/**
app_resources_expressions:
    - |-
      path.match(
        literal("public",
          greedy()))
    - |-
      path.match(
        literal("static",
          greedy()))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /static/css/app.css
      expect:
        allowed: true
    - request:
        method: GET
        path: /public/index.html
      expect:
        allowed: true
    - request:
        method: GET
        path: /other/x
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
