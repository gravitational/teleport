description: anti-pattern (commented out)
app_resources:
    - paths:
        - /api/v4/projects/{project}/**
        # - /api/status
        #   {project} not bound for this path
      where: contains(user.traits["allowed_projects"], vars.project)
app_resources_desugared:
    - |-
      path.match(
        literal("api/v4/projects",
          capture("project",
            greedy()))) &&
      contains(user.traits["allowed_projects"], vars.project)
identity:
    name: alice
    roles:
        - developer
    traits:
        allowed_projects:
            - alpha
            - beta
cases:
    - request:
        method: GET
        path: /api/v4/projects/alpha/issues
      expect:
        allowed: true
        vars:
            project: alpha
    - request:
        method: GET
        path: /api/v4/projects/beta
      expect:
        allowed: true
        vars:
            project: beta
    - request:
        method: GET
        path: /api/v4/projects/zzz/issues
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
