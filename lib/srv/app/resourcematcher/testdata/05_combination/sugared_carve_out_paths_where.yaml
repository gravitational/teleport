description: carve-out (paths grant, negated subtree)
app_resources_expression:
    # Allow all of /files, then carve out the
    # /files/secret subtree with a negated
    # path.match. The grant and the carve-out
    # share one expression, since path matching
    # never lives in a sugared where.
    - |-
      path.match(literal("files", greedy())) &&
      !path.match(literal("files",
          literal("secret", greedy())))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/a
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/secret/key
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/secret
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /other
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
