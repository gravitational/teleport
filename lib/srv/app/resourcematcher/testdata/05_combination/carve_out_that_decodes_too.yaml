description: carve-out and the strict tokenizer
app_resources_expressions:
    # A negated carve-out denies files/secret. An attempt to reach it with an
    # encoded "s" (%73) never decodes: the strict tokenizer rejects any escape
    # that is not the encoded separator, so the request is invalid before a
    # rule runs rather than slipping past the negation.
    - |-
      !path.match(literal("files",
          literal("secret", greedy())))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/%73ecret/key
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
    - request:
        method: GET
        path: /files/public/key
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/secret/key
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files/secret%2fkey
      expect:
        allowed: true
    - request:
        method: GET
        path: /other
      expect:
        allowed: true
