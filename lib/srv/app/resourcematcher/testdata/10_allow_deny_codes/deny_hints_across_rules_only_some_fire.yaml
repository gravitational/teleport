description: deny hints across rules, only some fire
app_resources:
    - paths:
        - /api/v4/projects/{project}/**
      where: contains(user.traits["allowed_projects"], vars.project)
      deny_code: denied_project
      deny_reason: Not allowed on this project
    - paths:
        - /api/v4/admin/**
      where: contains(user.roles, "admin")
      deny_code: denied_admin
      deny_reason: Admin role required
app_resources_desugared:
    - |-
      path.match(
        literal("api/v4/projects",
          capture("project",
            greedy()))) &&
      (contains(user.traits["allowed_projects"], vars.project) || append_deny_hint("denied_project", "Not allowed on this project"))
    - |-
      path.match(
        literal("api/v4/admin",
          greedy())) &&
      (contains(user.roles, "admin") || append_deny_hint("denied_admin", "Admin role required"))
identity:
    name: bob
    roles:
        - developer
    traits:
        allowed_projects:
            - alpha
cases:
    - request:
        method: GET
        path: /api/v4/projects/gamma/issues
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
        deny_hints:
            - code: denied_project
              reason: Not allowed on this project
    - request:
        method: GET
        path: /api/v4/admin/settings
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
        deny_hints:
            - code: denied_admin
              reason: Admin role required
    - request:
        method: GET
        path: /api/v4/projects/alpha/issues
      expect:
        allowed: true
        vars:
            project: alpha
    - request:
        method: GET
        path: /other
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
