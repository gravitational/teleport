description: 'deny code: a where-only rule fires on any deny'
app_resources:
    # A where-only rule has no path or method to scope the near-miss, so its
    # deny code fires on every deny in the rule's scope, explaining that the
    # identity did not qualify regardless of the path requested.
    - where: contains(user.roles, "admin")
      deny_code: needs_admin
      deny_reason: You need the admin role.
app_resources_desugared:
    - contains(user.roles, "admin")
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /any/unrelated/path
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
        deny_hints:
            - code: needs_admin
              reason: You need the admin role.
    - request:
        method: POST
        path: /something/else
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
        deny_hints:
            - code: needs_admin
              reason: You need the admin role.
    - request:
        method: GET
        path: /admin/settings
      expect:
        allowed: true
      identity:
        name: alice
        roles:
            - admin
