description: 'deny hint: path matched, where failed'
app_resources:
    - paths:
        - /api/v4/projects/{project}/**
      where: contains(user.traits["allowed_projects"], vars.project)
      allow_code: allowed_project
      allow_reason: User has access to project
      # deny_code_hint is reported on the near-miss: the path and
      # method matched but the where failed.
      deny_code_hint: denied_project
      deny_reason_hint: User has NO access to project
app_resources_desugared:
    - |-
      allow_code("allowed_project", "User has access to project",
        path.match(
          literal("api/v4/projects",
            capture("project",
              greedy()))) &&
        deny_hint("denied_project", "User has NO access to project",
          contains(user.traits["allowed_projects"], vars.project)))
identity:
    name: alice
    roles:
        - developer
    traits:
        allowed_projects:
            - alpha
            - beta
cases:
    - request:
        method: GET
        path: /api/v4/projects/gamma/issues
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
        deny_hints:
            - code: denied_project
              reason: User has NO access to project
    - request:
        method: GET
        path: /api/v4/projects/alpha/issues
      expect:
        allowed: true
        vars:
            project: alpha
        allow_code: allowed_project
        allow_reason: User has access to project
    - request:
        method: GET
        path: /other
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
