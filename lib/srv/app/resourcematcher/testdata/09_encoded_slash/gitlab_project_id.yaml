description: GitLab project id, plain or encoded, in one node
rules:
    # A GitLab project id is either a numeric id (123) or a URL-encoded
    # "group/project" path. capture_encoded binds both forms as one raw
    # segment, with no OR-doubling between a plain and an encoded matcher. The
    # match opts into the encoded separator with allow_encoded(set("/")).
    - pred: |-
        path.match(literal("api/v4/projects",
            capture_encoded("project", set("/"), greedy())), allow_encoded(set("/")))
rules_desugared:
    - pred: |-
        path.match(
          literal("api/v4/projects",
            capture_encoded("project",
              set("/"),
              greedy())),
          allow_encoded(
            set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/123/issues
      expect:
        allowed: true
        vars:
            project: "123"
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fmyproject/issues
      expect:
        allowed: true
        vars:
            project: mygroup%2Fmyproject
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fsub%2Fmyproject/issues
      expect:
        allowed: true
        vars:
            project: mygroup%2Fsub%2Fmyproject
