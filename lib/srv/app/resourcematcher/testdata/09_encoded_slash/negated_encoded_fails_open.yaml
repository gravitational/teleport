description: a negation combined with an encoded-slash matcher is a load error
rules:
    # The carve-out fail-open: the positive grant admits an encoded project id,
    # but the negation uses a plain matcher that misses the encoded form, so an
    # attacker reaches /variables via mygroup%2Fmyproject. The negation lint
    # rejects any negation combined with an encoded-slash matcher at load.
    - pred: |-
        path.match(literal("api/v4/projects",
            capture_encoded_slash("project", greedy()))) &&
        !path.match(literal("api/v4/projects",
            glob(literal("variables"))))
error: encoded-slash matcher
