description: a double-encoded slash is invalid, even under an encoded-slash node
app_resources_expressions:
    # A double-encoded slash (%252F) is not
    # the separator, so the tokenizer
    # rejects the path before matching.
    - |-
      path.match(literal("api/v4/projects",
          capture_encoded("project", set("/"), greedy())))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/a%252Fb/issues
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
    - request:
        method: GET
        path: /api/v4/projects/a%2Fb/issues
      expect:
        allowed: true
        vars:
            project: a/b
