description: an encoded node without allow_encoded fails closed
app_resources:
    # {package:/} names an encoded segment;
    # without allow_encoded it fails closed.
    # denies /registry/@babel%2fcore
    # allows /registry/lodash
    - paths:
        - /registry/{package:/}
app_resources_desugared:
    - |-
      path.match(
        literal("registry",
          capture_encoded("package",
            set("/"))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
