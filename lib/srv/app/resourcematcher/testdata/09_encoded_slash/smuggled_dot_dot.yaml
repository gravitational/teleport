description: a ".." smuggled between encoded slashes is rejected
app_resources_expression:
    # The decode-for-validation view turns a%2F..%2Fadmin into a/../admin, so
    # the ".." segment is caught the same as a raw one. The encoded node never
    # sees it: the path is invalid before any matcher runs.
    - |-
      path.match(literal("api/v4/projects",
          capture_encoded("project", set("/"), greedy())),
      allow_encoded(set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/a%2F..%2Fadmin/issues
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
    - request:
        method: GET
        path: /api/v4/projects/a%2F%2Fb/issues
      expect:
        allowed: false
        deny_kind: teleport_invalid_request
