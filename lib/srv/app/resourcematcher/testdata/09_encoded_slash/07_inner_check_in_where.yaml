description: constrain an encoded id with a where check on the decoded value
app_resources_expressions:
    # An encoded segment binds its decoded
    # value, so pin it in a where check on the
    # decoded capture, with a literal "/".
    - |-
      path.match(literal("api/v4/projects",
          capture_encoded("project", set("/"), greedy()))) &&
      vars.project == "mygroup/myproject"
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fmyproject/issues
      expect:
        allowed: true
        vars:
            project: mygroup/myproject
    - request:
        method: GET
        path: /api/v4/projects/other%2Fthing/issues
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
