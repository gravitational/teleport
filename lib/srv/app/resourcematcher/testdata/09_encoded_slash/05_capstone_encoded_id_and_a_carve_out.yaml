description: an encoded id, a carved-out subtree, and the encoded-slash opt-in
app_resources_expressions:
    # allows /api/v4/projects/g%2fp/issues
    # denies /api/v4/projects/g%2fp/secret
    - |-
      path.match(literal("api/v4/projects",
          capture_encoded("project", set("/"),
              greedy_without("secret"))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2fmyproject/issues
      expect:
        allowed: true
        vars:
            project: mygroup/myproject
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2fmyproject/secret
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
