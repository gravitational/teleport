description: npm scoped package keeps its literal "@" raw
app_resources:
    # allow_encoded opts the match in.
    # {package:/} binds /@scope%2fname raw,
    # so "@" stays "@", never %40.
    # allows /registry/@babel%2fcore
    - paths:
        - /registry/{package:/}
      allow_encoded:
        - /
app_resources_desugared:
    - |-
      path.match(
        literal("registry",
          capture_encoded("package",
            set("/"))),
        allow_encoded(
          set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: true
        vars:
            package: '@babel%2fcore'
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
