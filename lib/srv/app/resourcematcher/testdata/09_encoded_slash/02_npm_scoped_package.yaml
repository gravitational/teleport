description: npm scoped package binds its decoded id
app_resources:
    # allow_encoded opts the match in.
    # {package:/} binds the decoded id, so
    # /@scope%2fname reads as @scope/name.
    # allows /registry/@babel%2fcore
    - paths:
        - /registry/{package:/}
      allow_encoded:
        - /
app_resources_desugared:
    - |-
      path.match(
        literal("registry",
          capture_encoded("package",
            set("/"))),
        allow_encoded(
          set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: true
        vars:
            package: '@babel/core'
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
