description: npm scoped package binds its decoded id
app_resources:
    # {package:/} is the encoded-node opt-in.
    # It binds the decoded id, so
    # /@scope%2fname reads as @scope/name.
    # allows /registry/@babel%2fcore
    - paths:
        - /registry/{package:/}
app_resources_expressions:
    - |-
      path.match(
        literal("registry",
          capture_encoded("package",
            set("/"))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: true
        vars:
            package: '@babel/core'
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
