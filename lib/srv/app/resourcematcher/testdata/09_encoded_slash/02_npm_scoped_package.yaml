description: npm scoped package keeps its literal "@" raw
app_resources_expression:
    # allow_encoded now opts the match in.
    # capture_encoded binds /@scope%2fname
    # raw, so "@" stays "@", never %40.
    # allows /registry/@babel%2fcore
    - |-
      path.match(literal("registry",
          capture_encoded("package", set("/"))),
      allow_encoded(set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: true
        vars:
            package: '@babel%2fcore'
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
