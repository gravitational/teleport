description: GitLab files route, encoded id and encoded file path
app_resources_expressions:
    # The files API takes an encoded id and
    # an encoded file path. Each position is
    # named and binds its decoded value; the
    # raw bytes still forward byte-faithful.
    - |-
      path.match(literal("api/v4/projects",
          capture_encoded("project", set("/"),
              literal("repository/files",
                  capture_encoded("file", set("/"))))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fmyproject/repository/files/lib%2Fsrv%2Fapp.go
      expect:
        allowed: true
        vars:
            file: lib/srv/app.go
            project: mygroup/myproject
    - request:
        method: GET
        path: /api/v4/projects/123/repository/files/README.md
      expect:
        allowed: true
        vars:
            file: README.md
            project: "123"
    - request:
        method: GET
        path: /api/v4/projects/123/repository/files/a/b
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
