description: GitLab project id, plain or encoded, in one node
app_resources_expression:
    # One capture_encoded binds a plain id or
    # an encoded group/project in one node.
    # allows project 123
    # allows project mygroup%2Fmyproject
    - |-
      path.match(literal("api/v4/projects",
          capture_encoded("project", set("/"), greedy())),
      allow_encoded(set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/123/issues
      expect:
        allowed: true
        vars:
            project: "123"
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fmyproject/issues
      expect:
        allowed: true
        vars:
            project: mygroup%2Fmyproject
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fsub%2Fmyproject/issues
      expect:
        allowed: true
        vars:
            project: mygroup%2Fsub%2Fmyproject
