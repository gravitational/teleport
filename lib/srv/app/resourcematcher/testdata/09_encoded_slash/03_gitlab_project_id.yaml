description: GitLab project id, plain or encoded, in one node
app_resources:
    # One {project:/} binds a plain id or an
    # encoded group/project in one node, and
    # ** matches the rest of the route.
    # allows project 123
    # allows project mygroup%2Fmyproject
    - paths:
        - /api/v4/projects/{project:/}/**
app_resources_expressions:
    - |-
      path.match(
        literal("api/v4/projects",
          capture_encoded("project",
            set("/"),
            greedy())))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/123/issues
      expect:
        allowed: true
        vars:
            project: "123"
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fmyproject/issues
      expect:
        allowed: true
        vars:
            project: mygroup/myproject
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fsub%2Fmyproject/issues
      expect:
        allowed: true
        vars:
            project: mygroup/sub/myproject
