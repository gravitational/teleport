description: GitLab files route, encoded id and encoded file path
app_resources_expression:
    # The files API takes an encoded project id and an encoded file path:
    # GET /api/v4/projects/:id/repository/files/:file_path. Each encoded
    # position is named explicitly, and both bind raw and forward byte-faithful.
    # The match opts into the encoded separator with allow_encoded.
    - |-
      path.match(literal("api/v4/projects",
          capture_encoded("project", set("/"),
              literal("repository/files",
                  capture_encoded("file", set("/"))))),
      allow_encoded(set("/")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fmyproject/repository/files/lib%2Fsrv%2Fapp.go
      expect:
        allowed: true
        vars:
            file: lib%2Fsrv%2Fapp.go
            project: mygroup%2Fmyproject
    - request:
        method: GET
        path: /api/v4/projects/123/repository/files/README.md
      expect:
        allowed: true
        vars:
            file: README.md
            project: "123"
    - request:
        method: GET
        path: /api/v4/projects/123/repository/files/a/b
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
