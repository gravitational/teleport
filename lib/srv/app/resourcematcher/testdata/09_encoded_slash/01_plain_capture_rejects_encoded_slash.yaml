description: a plain capture rejects an encoded slash
app_resources:
    # {package} is a plain capture, safe-only,
    # so a token carrying %2F fails closed.
    # Use {package:/} to admit an encoded id.
    # denies /registry/@babel%2fcore
    # allows /registry/lodash
    - paths:
        - /registry/{package}
app_resources_expressions:
    - |-
      path.match(
        literal("registry",
          capture("package")))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /registry/@babel%2fcore
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /registry/lodash
      expect:
        allowed: true
        vars:
            package: lodash
