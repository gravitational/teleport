description: encoded_literal matches one group/project by its decoded value
app_resources_expressions:
    # encoded_literal matches one segment by
    # its decoded value, in either hex case
    # (%2F or %2f).
    # allows project mygroup%2Fmyproject
    # denies project other%2Fthing
    - |-
      path.match(literal("api/v4/projects",
          encoded_literal("mygroup/myproject", set("/"),
              literal("issues"))))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2Fmyproject/issues
      expect:
        allowed: true
    - request:
        method: GET
        path: /api/v4/projects/mygroup%2fmyproject/issues
      expect:
        allowed: true
    - request:
        method: GET
        path: /api/v4/projects/other%2Fthing/issues
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /api/v4/projects/mygroup/myproject/issues
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
