description: a broad ** never spans an encoded slash
app_resources:
    # ** spans only segments with no percent
    # encoding, so /files/** matches a plain
    # tail but stops at an encoded slash. It
    # cannot silently admit one.
    - paths:
        - /files/**
app_resources_desugared:
    - |-
      path.match(
        literal("files",
          greedy()))
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: GET
        path: /files/a/b/c
      expect:
        allowed: true
    - request:
        method: GET
        path: /files/a%2Fb
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /files
      expect:
        allowed: true
