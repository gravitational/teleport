description: wrong method denied
rules:
    - paths:
        - /api/**
      methods:
        - GET
rules_desugared:
    - pred: |-
        path.match(
          literal("api",
            greedy())) &&
        contains(
          set("GET"), request.method)
identity:
    name: bob
    roles:
        - developer
cases:
    - request:
        method: POST
        path: /api/users
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
    - request:
        method: GET
        path: /api/users
      expect:
        allowed: true
    - request:
        method: PUT
        path: /api/users
      expect:
        allowed: false
        deny_kind: teleport_request_not_allowed
