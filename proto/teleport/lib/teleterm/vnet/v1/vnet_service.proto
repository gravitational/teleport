syntax = "proto3";

package teleport.lib.teleterm.vnet.v1;

import "google/protobuf/timestamp.proto";
import "teleport/lib/vnet/diag/v1/diag.proto";

option go_package = "github.com/gravitational/teleport/gen/proto/go/teleport/lib/teleterm/vnet/v1;vnetv1";

// VnetService provides methods to manage a VNet instance.
service VnetService {
  // Start starts VNet.
  rpc Start(StartRequest) returns (StartResponse);

  // Stop stops VNet.
  rpc Stop(StopRequest) returns (StopResponse);

  // GetServiceInfo returns info about the running VNet service.
  rpc GetServiceInfo(GetServiceInfoRequest) returns (GetServiceInfoResponse);

  // GetBackgroundItemStatus returns the status of the background item responsible for launching
  // VNet daemon. macOS only. tsh must be compiled with the vnetdaemon build tag.
  rpc GetBackgroundItemStatus(GetBackgroundItemStatusRequest) returns (GetBackgroundItemStatusResponse);

  // CheckInstallTimeRequirements validates install-time prerequisites (for example, VNet service presence) that can
  // only be changed by reinstalling the app.
  rpc CheckInstallTimeRequirements(CheckInstallTimeRequirementsRequest) returns (CheckInstallTimeRequirementsResponse);

  // RunDiagnostics runs a set of heuristics to determine if VNet actually works on the device, that
  // is receives network traffic and DNS queries. RunDiagnostics requires VNet to be started.
  rpc RunDiagnostics(RunDiagnosticsRequest) returns (RunDiagnosticsResponse);

  // AutoConfigureSSH automatically configures OpenSSH-compatible clients for
  // connections to Teleport SSH hosts.
  rpc AutoConfigureSSH(AutoConfigureSSHRequest) returns (AutoConfigureSSHResponse);

  // GetRecentConnections streams the list of recent connections proxied by the
  // running VNet service. The server sends the current list immediately and
  // then a new list whenever it changes, until the stream is canceled or VNet
  // stops. Requires VNet to be started.
  rpc GetRecentConnections(GetRecentConnectionsRequest) returns (stream GetRecentConnectionsResponse);

  // GetConnections streams VNet connection activity: aggregated per-target
  // statistics plus a capped window of individual connection records. The
  // server sends the current snapshot immediately and then a fresh one whenever
  // it changes, until the stream is canceled or VNet stops. Requires VNet to be
  // started.
  rpc GetConnections(GetConnectionsRequest) returns (stream GetConnectionsResponse);
}

// Request for Start.
message StartRequest {}

// Response for Start.
message StartResponse {}

// Request for Stop.
message StopRequest {}

// Response for Stop.
message StopResponse {}

// Request for GetServiceInfo.
message GetServiceInfoRequest {}

// GetServiceInfoResponse contains the status of the running VNet service.
message GetServiceInfoResponse {
  // app_dns_zones is a deduplicated list of all DNS zones valid as DNS
  // suffixes for connections to TCP apps.
  repeated string app_dns_zones = 1;
  // clusters is a list of cluster names valid as DNS suffixes for SSH hosts.
  repeated string clusters = 2;
  // ssh_configured is true if the user's SSH config file includes VNet's
  // generated SSH config necessary for SSH access.
  bool ssh_configured = 3;
  // vnet_ssh_config_path is the path of VNet's generated OpenSSH-compatible
  // config file.
  string vnet_ssh_config_path = 4;
}

// Request for GetBackgroundItemStatus.
message GetBackgroundItemStatusRequest {}

// Response for GetBackgroundItemStatus.
message GetBackgroundItemStatusResponse {
  BackgroundItemStatus status = 1;
}

// BackgroundItemStatus maps to SMAppServiceStatus of the Service Management framework in macOS.
// https://developer.apple.com/documentation/servicemanagement/smappservice/status-swift.enum?language=objc
enum BackgroundItemStatus {
  BACKGROUND_ITEM_STATUS_UNSPECIFIED = 0;
  BACKGROUND_ITEM_STATUS_NOT_REGISTERED = 1;
  // This is the status the background item should have before tsh attempts to send a message to the
  // daemon.
  BACKGROUND_ITEM_STATUS_ENABLED = 2;
  BACKGROUND_ITEM_STATUS_REQUIRES_APPROVAL = 3;
  BACKGROUND_ITEM_STATUS_NOT_FOUND = 4;
  BACKGROUND_ITEM_STATUS_NOT_SUPPORTED = 5;
}

// WindowsServiceStatus maps to service-related errors in golang.org/x/sys/windows/zerrors_windows.go.
enum WindowsServiceStatus {
  WINDOWS_SERVICE_STATUS_UNSPECIFIED = 0;
  WINDOWS_SERVICE_STATUS_OK = 1;
  WINDOWS_SERVICE_STATUS_DOES_NOT_EXIST = 2;
  // The VNet service cannot start because its version differs from the client.
  WINDOWS_SERVICE_STATUS_VERSION_MISMATCH = 3;
}

// Request for CheckInstallTimeRequirementsRequest.
message CheckInstallTimeRequirementsRequest {}

// Response for CheckInstallTimeRequirementsResponse.
message CheckInstallTimeRequirementsResponse {
  oneof status {
    WindowsServiceStatus windows_service_status = 1;
  }
}

// Request for RunDiagnostics.
message RunDiagnosticsRequest {}

// Response for RunDiagnostics.
message RunDiagnosticsResponse {
  teleport.lib.vnet.diag.v1.Report report = 1;
}

// Request for AutoConfigureSSH.
message AutoConfigureSSHRequest {}

// Response for AutoConfigureSSH.
message AutoConfigureSSHResponse {}

// Request for GetRecentConnections.
message GetRecentConnectionsRequest {}

// Response for GetRecentConnections, containing the full list of recent
// connections deduplicated per target and ordered most-recently-connected
// first.
message GetRecentConnectionsResponse {
  repeated RecentConnection connections = 1;
}

// RecentConnectionKind is the kind of target a recent connection was made to.
enum RecentConnectionKind {
  RECENT_CONNECTION_KIND_UNSPECIFIED = 0;
  RECENT_CONNECTION_KIND_APP = 1;
  RECENT_CONNECTION_KIND_SSH = 2;
  RECENT_CONNECTION_KIND_DATABASE = 3;
}

// RecentConnection describes a single target recently connected to through VNet.
message RecentConnection {
  // kind is the kind of the target (TCP app, SSH host, or database).
  RecentConnectionKind kind = 1;
  // cluster is the profile (root cluster) the target is found in.
  string cluster = 2;
  // leaf_cluster is the leaf cluster the target is found in. Empty if the target
  // is in the root cluster.
  string leaf_cluster = 3;
  // display_name is the address shown to the user, e.g. the app public address,
  // the database FQDN, or the SSH host address.
  string display_name = 4;
  // last_connected is the time of the most recent connection to the target.
  google.protobuf.Timestamp last_connected = 5;
  // last_client_process_path is the filesystem path of the local program that
  // most recently opened a connection to the target. Best-effort and
  // platform-specific (currently macOS only); empty when the process could not
  // be identified.
  string last_client_process_path = 6;
}

// Request for GetConnections.
message GetConnectionsRequest {}

// Response for GetConnections, containing the complete snapshot of VNet
// connection activity.
message GetConnectionsResponse {
  // stats holds the aggregated statistics for every target connected to since
  // VNet started, one entry per target. Counters are absolute values and are
  // never evicted.
  repeated ConnectionStat stats = 1;
  // connections holds the individual connection records currently kept, ordered
  // newest-first. Capped, so it does not necessarily cover every connection
  // accounted for in stats.
  repeated ConnectionRecord connections = 2;
}

// ConnectionRecordState is the state of an individual connection.
enum ConnectionRecordState {
  CONNECTION_RECORD_STATE_UNSPECIFIED = 0;
  // ACTIVE means the connection was established and is still proxying traffic.
  CONNECTION_RECORD_STATE_ACTIVE = 1;
  // DONE means the connection was established and has ended. It may still carry
  // an error message if it ended with a mid-stream error.
  CONNECTION_RECORD_STATE_DONE = 2;
  // FAILED means the connection was never established.
  CONNECTION_RECORD_STATE_FAILED = 3;
}

// ConnectionRecord describes a single connection made through VNet.
message ConnectionRecord {
  // id uniquely identifies the connection within a single VNet run. It
  // increases monotonically with the time the connection started at.
  uint64 id = 1;
  // kind is the kind of the target (TCP app, SSH host, or database).
  RecentConnectionKind kind = 2;
  // cluster is the profile (root cluster) the target is found in.
  string cluster = 3;
  // leaf_cluster is the leaf cluster the target is found in. Empty if the
  // target is in the root cluster.
  string leaf_cluster = 4;
  // display_name is the address shown to the user, e.g. the app public address,
  // the database FQDN, or the SSH host address.
  string display_name = 5;
  // port is the target port of the connection. Only set for multi-port TCP
  // apps, zero otherwise. Together with the fields above it identifies the
  // target, matching the same fields on ConnectionStat.
  uint32 port = 6;
  // local_port is the port the client application actually dialed. Unlike port
  // it is always set. For single-port TCP apps and databases the dialed port is
  // not part of the target identity, VNet routes the connection to the port
  // from the resource spec no matter which port was dialed.
  uint32 local_port = 7;
  // client_process_path is the executable path of the local program that opened
  // the connection, best-effort and possibly empty.
  string client_process_path = 8;
  // started_at is the time the connection was opened at.
  google.protobuf.Timestamp started_at = 9;
  // ended_at is the time the connection ended at. Unset while the connection is
  // still active.
  google.protobuf.Timestamp ended_at = 10;
  // bytes_tx is the number of bytes transmitted to the target over this
  // connection. Updated while the connection is active, final once it ended.
  uint64 bytes_tx = 11;
  // bytes_rx is the number of bytes received from the target over this
  // connection. Updated while the connection is active, final once it ended.
  uint64 bytes_rx = 12;
  // state is the state of the connection.
  ConnectionRecordState state = 13;
  // error_message is the reason a FAILED connection could not be established.
  // Empty otherwise, including for DONE connections: once established, a
  // connection is a success no matter how it ended.
  string error_message = 14;
}

// ConnectionStat holds the aggregated connection statistics for a single
// target connected to through VNet. All counters are absolute values
// accumulated since VNet started.
message ConnectionStat {
  // kind is the kind of the target (TCP app, SSH host, or database).
  RecentConnectionKind kind = 1;
  // cluster is the profile (root cluster) the target is found in.
  string cluster = 2;
  // leaf_cluster is the leaf cluster the target is found in. Empty if the
  // target is in the root cluster.
  string leaf_cluster = 3;
  // display_name is the address shown to the user, e.g. the app public address,
  // the database FQDN, or the SSH host address.
  string display_name = 4;
  // port is the target port of the connection. Only set for multi-port TCP
  // apps, zero otherwise.
  uint32 port = 5;
  // successful_connections is the number of connections to the target that
  // were successfully established.
  uint64 successful_connections = 6;
  // failed_connections is the number of connections to the target that failed
  // to be established.
  uint64 failed_connections = 7;
  // bytes_tx is the total number of bytes transmitted to the target, as
  // measured on the connection between the client application and VNet.
  uint64 bytes_tx = 8;
  // bytes_rx is the total number of bytes received from the target, as
  // measured on the connection between the client application and VNet.
  uint64 bytes_rx = 9;
  // bytes_tx_per_sec is the transmit throughput to the target measured over
  // the most recent sampling interval.
  uint64 bytes_tx_per_sec = 10;
  // bytes_rx_per_sec is the receive throughput from the target measured over
  // the most recent sampling interval.
  uint64 bytes_rx_per_sec = 11;
}
