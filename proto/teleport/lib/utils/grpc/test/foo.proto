syntax = "proto3";

package teleport.lib.utils.grpc.test;

option go_package = "github.com/gravitational/teleport/lib/utils/grpc/test";

// FooService is a test-only bidi-streaming service used to exercise generic
// gRPC proxy helpers in lib/utils/grpc. Its Session RPC models an interactive
// session (SSH, Kubernetes exec, etc.) whose contract explicitly accepts that
// either side may terminate the stream at any time without advance
// coordination.
service FooService {
  // Session is a bidi-streaming RPC. The client streams inputs; the server
  // streams outputs. Either side may end its half independently: the client may
  // half-close (CloseSend) and keep receiving, and the server may return at any
  // point, after which any further client messages are discarded.
  rpc Session(stream SessionRequest) returns (stream SessionResponse);
}

// SessionRequest carries input from the client to the server, e.g. keystrokes.
message SessionRequest {
  string input = 1;
}

// SessionResponse carries output from the server to the client, e.g. terminal
// output.
message SessionResponse {
  string output = 1;
}
