syntax = "proto3";

package teleport.tag.v1;

import "google/protobuf/empty.proto";
import "teleport/options/v1/resource.proto";
import "teleport/tag/v1/tag.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/tag/v1;tagv1";

// TagService provides CRUD for Tag resources.
service TagService {
  option (teleport.options.v1.resource_config) = {
    storage: {
      backend_prefix: "tags"
      standard: {}
    }
  };

  // GetTag returns a tag by name.
  rpc GetTag(GetTagRequest) returns (Tag);
  // ListTags returns a paginated list of tags.
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
  // CreateTag creates a new tag.
  rpc CreateTag(CreateTagRequest) returns (Tag);
  // UpdateTag updates an existing tag.
  rpc UpdateTag(UpdateTagRequest) returns (Tag);
  // DeleteTag deletes a tag by name.
  rpc DeleteTag(DeleteTagRequest) returns (google.protobuf.Empty);
}

// GetTagRequest is the request for GetTag.
message GetTagRequest {
  // name is the tag name.
  string name = 1;
}

// ListTagsRequest is the request for ListTags.
message ListTagsRequest {
  // page_size is the maximum number of items to return.
  int32 page_size = 1;
  // page_token is the next_page_token from a previous request.
  string page_token = 2;
}

// ListTagsResponse is the response for ListTags.
message ListTagsResponse {
  // tags is the list of tags.
  repeated Tag tags = 1;
  // next_page_token is the token for the next page.
  string next_page_token = 2;
}

// CreateTagRequest is the request for CreateTag.
message CreateTagRequest {
  // tag is the tag to create.
  Tag tag = 1;
}

// UpdateTagRequest is the request for UpdateTag.
message UpdateTagRequest {
  // tag is the tag to update.
  Tag tag = 1;
}

// DeleteTagRequest is the request for DeleteTag.
message DeleteTagRequest {
  // name is the tag name to delete.
  string name = 1;
}
