syntax = "proto3";

package teleport.tag.v1;

import "teleport/header/v1/metadata.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/tag/v1;tagv1";

// Tag is a simple label resource.
message Tag {
  string kind = 1;
  string sub_kind = 2;
  string version = 3;
  teleport.header.v1.Metadata metadata = 4;
  TagSpec spec = 5;
}

// TagSpec contains the tag value.
message TagSpec {
  string value = 1;
}
