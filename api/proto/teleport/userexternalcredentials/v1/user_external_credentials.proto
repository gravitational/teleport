syntax = "proto3";

package teleport.userexternalcredentials.v1;

import "google/protobuf/timestamp.proto";
import "teleport/header/v1/metadata.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/userexternalcredentials/v1;userexternalcredentialsv1";

// UserExternalCredentials stores per-user credentials for external services.
// Only Auth accesses this resource (no gRPC service, no cache).
message UserExternalCredentials {
  string kind = 1;
  string sub_kind = 2;
  string version = 3;
  teleport.header.v1.Metadata metadata = 4;
  UserExternalCredentialsSpec spec = 5;
}

// UserExternalCredentialsSpec holds the credential details.
message UserExternalCredentialsSpec {
  string user = 1;
  oneof credentials {
    GitHubOAuthCredentials github_oauth = 2;
  }
}

// GitHubOAuthCredentials stores GitHub OAuth tokens.
message GitHubOAuthCredentials {
  string access_token = 1;
  google.protobuf.Timestamp access_token_expiry = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp refresh_token_expiry = 4;
}
