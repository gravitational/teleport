syntax = "proto3";

package teleport.beams.v1;

import "google/protobuf/empty.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/beams/v1;beamsv1";

// BeamsOrchestratorService provisions beam compute for Teleport Cloud clusters.
service BeamsOrchestratorService {
  // ProvisionBeam provisions compute for the requested beam.
  rpc ProvisionBeam(ProvisionBeamRequest) returns (ProvisionBeamResponse);
  // DestroyBeam tears down compute for the requested beam.
  rpc DestroyBeam(DestroyBeamRequest) returns (google.protobuf.Empty);
}

// ProvisionBeamRequest contains parameters to provision a beam.
message ProvisionBeamRequest {
  // BeamID uniquely identifies the beam.
  string beam_id = 1;
  // Tbot contains the tbot configuration to use during provisioning.
  TbotConfig tbot = 2;
  // BeamAlias is the user-friendly identifier for the beam.
  string beam_alias = 3;
  // OpenAIAppName is the Teleport app name for the OpenAI-compatible API proxy.
  string openai_app_name = 4;
  // AnthropicAppName is the Teleport app name for the Anthropic API proxy.
  string anthropic_app_name = 5;
}

// ProvisionBeameResponse is the result of provisioning a beam.
message ProvisionBeamResponse {
  // SSHAddr is the host:port pair that can be used to connect to the beam's
  // OpenSSH server.
  string ssh_addr = 1;

  // AppAddrHTTP is the host:port pair that can be used to connect to the beam's
  // Envoy mTLS application proxy for HTTP applications.
  string app_addr_http = 2;

  // AppAddrTCP is the host:port pair that can be used to connect to the beam's
  // Envoy mTLS application proxy for TCP applications.
  string app_addr_tcp = 3;
}

// TbotConfig contains tbot configuration used during provisioning.
message TbotConfig {
  // JoinToken is the token used to join the cluster.
  string join_token = 1;
  // RegistrationSecret is the bound-keypair registration secret used to join the cluster.
  string registration_secret = 2;
  // DelegationSessionID is the user's delegation session identifier.
  string delegation_session_id = 3;
  // WorkloadIdentityName identifies the workload identity that will be used for
  // the Envoy application sidecar proxy.
  string workload_identity_name = 4;
  // NodeID identifies the Teleport node resource that will be used to SSH into
  // this beam. It is used as the principal in the SSH certificate.
  string node_id = 5;
}

// DestroyBeamRequest contains parameters to destroy a beam.
message DestroyBeamRequest {
  // BeamID uniquely identifies the beam.
  string beam_id = 1;
}
