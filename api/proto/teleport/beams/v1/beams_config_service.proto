syntax = "proto3";

package teleport.beams.v1;

import "teleport/beams/v1/beams_config.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/beams/v1;beamsv1";

// BeamsConfigService provides methods to manage the user-provided Beams
// configuration singleton.
service BeamsConfigService {
  // GetBeamsConfig returns the current BeamsConfig singleton.
  rpc GetBeamsConfig(GetBeamsConfigRequest) returns (GetBeamsConfigResponse);

  // CreateBeamsConfig creates a new BeamsConfig singleton.
  rpc CreateBeamsConfig(CreateBeamsConfigRequest) returns (CreateBeamsConfigResponse);

  // UpdateBeamsConfig updates an existing BeamsConfig singleton.
  rpc UpdateBeamsConfig(UpdateBeamsConfigRequest) returns (UpdateBeamsConfigResponse);

  // DeleteBeamsConfig deletes the BeamsConfig singleton.
  rpc DeleteBeamsConfig(DeleteBeamsConfigRequest) returns (DeleteBeamsConfigResponse);
}

// Request for GetBeamsConfig.
message GetBeamsConfigRequest {}

// Response for GetBeamsConfig.
message GetBeamsConfigResponse {
  BeamsConfig beams_config = 1;
}

// Request for CreateBeamsConfig.
message CreateBeamsConfigRequest {
  BeamsConfig beams_config = 1;
}

// Response for CreateBeamsConfig.
message CreateBeamsConfigResponse {
  BeamsConfig beams_config = 1;
}

// Request for UpdateBeamsConfig.
message UpdateBeamsConfigRequest {
  BeamsConfig beams_config = 1;
}

// Response for UpdateBeamsConfig.
message UpdateBeamsConfigResponse {
  BeamsConfig beams_config = 1;
}

// Request for DeleteBeamsConfig.
message DeleteBeamsConfigRequest {}

// Response for DeleteBeamsConfig.
message DeleteBeamsConfigResponse {}
