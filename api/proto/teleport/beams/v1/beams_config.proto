syntax = "proto3";

package teleport.beams.v1;

import "teleport/header/v1/metadata.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/beams/v1;beamsv1";

// BeamsConfig holds user-provided configuration for Beams.
message BeamsConfig {
  // Kind is the kind of resource represented. This is always `beams_config`.
  string kind = 1;
  // SubKind is the sub_kind of the resource. Always "".
  string sub_kind = 2;
  // Version is the version of the resource. Always "v1".
  string version = 3;
  // Metadata about this resource.
  teleport.header.v1.Metadata metadata = 4;
  // Spec defines the user-provided configuration parameters for Beams.
  BeamsConfigSpec spec = 5;
}

// BeamsConfigSpec defines the user-provided configuration parameters for Beams.
message BeamsConfigSpec {
  // Llm carries LLM inference configurations.
  LLMConfig llm = 1;
}

// LLMConfig defines the LLM providers available to Beams.
message LLMConfig {
  // Anthropic LLM endpoint configuration.
  LLMEndpointConfig anthropic = 1;
  // OpenAI LLM endpoint configuration.
  LLMEndpointConfig openai = 2;
}

// LLMEndpointConfig defines the configuration for an LLM endpoint backed by a
// Teleport app.
message LLMEndpointConfig {
  // AppName is the name of the Teleport app that proxies LLM requests. When
  // empty, defaults to the Cloud-managed LLM app for this endpoint.
  string app_name = 1;
}
