syntax = "proto3";

package teleport.beams.v1;

import "google/protobuf/empty.proto";
import "teleport/beams/v1/beam_config.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/beams/v1;beamsv1";

// ClusterBeamConfigService manages the cluster-wide beam configuration.
service ClusterBeamConfigService {
  // GetClusterBeamConfig returns the cluster-wide beam configuration.
  rpc GetClusterBeamConfig(GetClusterBeamConfigRequest) returns (ClusterBeamConfig);

  // CreateClusterBeamConfig creates the cluster-wide beam configuration.
  rpc CreateClusterBeamConfig(CreateClusterBeamConfigRequest) returns (ClusterBeamConfig);

  // UpdateClusterBeamConfig updates the cluster-wide beam configuration.
  rpc UpdateClusterBeamConfig(UpdateClusterBeamConfigRequest) returns (ClusterBeamConfig);

  // DeleteClusterBeamConfig removes the cluster-wide beam configuration.
  rpc DeleteClusterBeamConfig(DeleteClusterBeamConfigRequest) returns (google.protobuf.Empty);
}

// GetClusterBeamConfigRequest is the request for GetClusterBeamConfig.
message GetClusterBeamConfigRequest {}

// CreateClusterBeamConfigRequest is the request for CreateClusterBeamConfig.
message CreateClusterBeamConfigRequest {
  // Config is the cluster beam configuration to create.
  ClusterBeamConfig config = 1;
}

// UpdateClusterBeamConfigRequest is the request for UpdateClusterBeamConfig.
message UpdateClusterBeamConfigRequest {
  // Config is the cluster beam configuration to update.
  ClusterBeamConfig config = 1;
}

// DeleteClusterBeamConfigRequest is the request for DeleteClusterBeamConfig.
message DeleteClusterBeamConfigRequest {}
