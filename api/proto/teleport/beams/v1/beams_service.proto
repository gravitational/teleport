syntax = "proto3";

package teleport.beams.v1;

import "google/protobuf/empty.proto";
import "teleport/beams/v1/beam.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/beams/v1;beamsv1";

// BeamsService enables users to create ephemeral AI-optimized compute
// environments called "beams".
service BeamsService {
  // CreateBeam creates a new beam.
  rpc CreateBeam(CreateBeamRequest) returns (Beam);

  // GetBeam reads a beam.
  rpc GetBeam(GetBeamRequest) returns (Beam);

  // DeleteBeam deletes a beam and its associated resources.
  rpc DeleteBeam(DeleteBeamRequest) returns (google.protobuf.Empty);

  // ListBeams returns a page of beams.
  rpc ListBeams(ListBeamsRequest) returns (ListBeamsResponse);

  // WatchBeam returns the current state of the beam, and streams changes (e.g.
  // domains being allowed/denied).
  //
  // buf:lint:ignore RPC_NO_SERVER_STREAMING
  rpc WatchBeam(WatchBeamRequest) returns (stream Beam);

  // AllowDomain adds a domain to the beam's network allow-list, creating a
  // application for it if one does not already exist.
  rpc AllowDomain(AllowDomainRequest) returns (google.protobuf.Empty);

  // Publish a TCP port exposed by the as an application.
  rpc Publish(PublishRequest) returns (PublishResponse);
}

// CreateBeamRequest contains the parameters to CreateBeam.
message CreateBeamRequest {}

// GetBeamRequest contains the parameters to GetBeam.
message GetBeamRequest {
  oneof selector {
    // ID identifies the beam that will be read.
    string id = 1;

    // Alias identifies the beam that will be read.
    string alias = 2;
  }
}

// DeleteBeamRequest contains the parameters to DeleteBeam.
message DeleteBeamRequest {
  // BeamID identifies the beam that will be deleted.
  string beam_id = 1;
}

// ListBeamsRequest contains the parameters to ListBeams.
message ListBeamsRequest {
  // PageSize is the maximum number of items to return.
  // The server may impose a different page size at its discretion.
  int32 page_size = 1;

  // PageToken is the next_page_token value returned from a previous List
  // request, if any.
  string page_token = 2;
}

// ListBeamsResponse is the result of ListBeams.
message ListBeamsResponse {
  // Beams is the page of beams that matched the request.
  repeated Beam beams = 1;

  // NextPageToken is the token to retrieve the next page of results, or empty
  // if there are no more results in the list.
  string next_page_token = 2;
}

// WatchBeamRequest contains the parameters to WatchBeam.
message WatchBeamRequest {
  // ID of the beam that will be watched.
  string id = 1;
}

// AllowDomainRequest contains the parameters to AllowDomain.
message AllowDomainRequest {
  // BeamID identifies which beam's allow-list will be updated.
  string beam_id = 1;

  // FQDNs are the fully-qualified domain names that the beam will be allowed to
  // access (in addition to any other domains previously allowed).
  repeated string fqdns = 2;
}

// PublishRequest contains the parameters to Publish.
message PublishRequest {
  // BeamID identifies which beam's allow-list will be updated.
  string beam_id = 1;

  // Port is the TCP port that will be publish. Only 8080 is currently supported.
  int32 port = 2;

  // Protocol of the app that will be published.
  //
  // If PROTOCOL_HTTP is provided, the app will be available to web browsers
  // without running a local tunnel or VNet, with a TLS certificate.
  //
  // PROTOCOL_TCP is not currently supported, but will enable beams to expose
  // non-HTTP applications that can be accessed using a local tunnel or VNet.
  Protocol protocol = 3;
}

// Protocol of the app that will be published.
enum Protocol {
  // PROTOCOL_UNSPECIFIED is the enum zero value.
  PROTOCOL_UNSPECIFIED = 0;

  // PROTOCOL_TCP indicates a plain TCP app.
  PROTOCOL_TCP = 1;

  // PROTOCOL_HTTP indicates an HTTP app.
  PROTOCOL_HTTP = 2;
}

// PublishResponse is the result of publishing a beam port.
message PublishResponse {
  // Addr is the address at which the beam port can be reached.
  string addr = 1;
}
