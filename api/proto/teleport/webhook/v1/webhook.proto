syntax = "proto3";

package teleport.webhook.v1;

import "google/protobuf/timestamp.proto";
import "teleport/header/v1/metadata.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/webhook/v1;webhookv1";

// Webhook represents a notification endpoint that receives audit event deliveries.
message Webhook {
  // kind is the resource kind.
  string kind = 1;
  // sub_kind differentiates variants of the same resource kind.
  string sub_kind = 2;
  // version is the resource schema version.
  string version = 3;
  // metadata is common resource metadata.
  teleport.header.v1.Metadata metadata = 4;
  // spec is user-owned desired state.
  WebhookSpec spec = 5;
  // status contains runtime-only state.
  WebhookStatus status = 6;
}

// WebhookSpec contains user-configurable webhook properties.
message WebhookSpec {
  // url is the HTTPS endpoint URL that receives deliveries.
  string url = 1;
  // subscribed_events is the list of event types to deliver (e.g. "session.start", "user.login").
  repeated string subscribed_events = 2;
  // secret is the HMAC signing secret used to sign delivery payloads.
  string secret = 3;
  // enabled controls whether deliveries are active.
  bool enabled = 4;
  // max_retries is the number of delivery retry attempts (0-10).
  int32 max_retries = 5;
}

// WebhookStatus contains runtime-only webhook state.
message WebhookStatus {
  // total_deliveries is the total number of delivery attempts.
  int64 total_deliveries = 1;
  // failed_deliveries is the number of failed delivery attempts.
  int64 failed_deliveries = 2;
  // last_delivery is the timestamp of the most recent delivery attempt.
  google.protobuf.Timestamp last_delivery = 3;
}
