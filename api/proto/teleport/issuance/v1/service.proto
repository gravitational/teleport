syntax = "proto3";

package teleport.issuance.v1;

import "google/protobuf/duration.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/issuance/v1;issuancev1pb";

// IssuanceService provides methods for issuing certificates and other types
// of credential. It's designed to be called by already authenticated users and
// not to provide authentication (i.e. login).
//
// Today, it only supports methods for Bots to issue certificates to themselves,
// but may be extended in the future to support other types of certificate
// issuance.
//
// Some deviations from historical issuance methods in Teleport:
//
// 1. Rather than accept a desired certificate expiry time, accept a desired
//    TTL. This avoids issues caused by client clock skew.
// 2. Avoid returning certificate authority information. The client is already
//    authenticated and has access to this information. If we ever must return
//    CA information, we MUST ensure that different CA types are not
//    intermingled - it must be explicit what CA is being returned.
service IssuanceService {
  // Issues certificates to an already authenticated scoped bot. Designed to
  // be called by a scoped `tbot` when generating outputs. Can only be called
  // by a scoped bot identity.
  //
  // For now, only supports plain identity - i.e. no access method specific
  // attributes.
  rpc IssueScopedBotCerts(IssueScopedBotCertsRequest) returns (IssueScopedBotCertsResponse);
}

// Request for IssueScopedBotCerts
message IssueScopedBotCertsRequest {
  // The SSH public key in SSH authorized_keys format, to be used as
  // the subject for the issued SSH certificate. If omitted, only a TLS cert
  // will be returned.
  bytes ssh_public_key = 1;
  // The TLS public key in PEM-encoded PKCS#1 or PKIX format, to be used as
  // the subject for the issued TLS certificate. If omitted, only an SSH cert
  // will be returned.
  bytes tls_public_key = 2;

  // Requested TTL for the issued certificate.
  // If greater than the maximum allowed TTL, the request will be rejected.
  google.protobuf.Duration ttl = 3;
}

// Response for IssueScopedBotCerts
message IssueScopedBotCertsResponse {
  // Issued certificates.
  Certs certs = 1;
}

// Set of certificates corresponding to a single public key.
message Certs {
  // SSH certificate marshaled in the authorized key format.
  bytes ssh = 1;
  // TLS X.509 certificate as an ASN.1 PEM DER.
  bytes tls = 2;
}
