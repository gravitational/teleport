syntax = "proto3";

package teleport.discoveryservice.v1;

import "google/protobuf/duration.proto";
import "teleport/header/v1/metadata.proto";
import "teleport/legacy/types/types.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/discoveryservice/v1;discoveryservicev1";

// DiscoveryService is the presence heartbeat of a Teleport Discovery Service
// instance, carrying its effective configuration: discovery group, static
// matchers from the process configuration file (post-normalization,
// post-discard), and the dynamic DiscoveryConfigs it has adopted. One resource
// exists per Discovery Service instance, named by its host ID, and it expires
// unless renewed by the instance's periodic announce. This message serves as
// both the type used in the v1 service and the canonical v1 storage format
// (in protojson). See RFD 253.
message DiscoveryService {
  // kind is the fixed string "discovery_service".
  string kind = 1;
  // sub_kind is unused; fixed string "".
  string sub_kind = 2;
  // version is the fixed string "v1".
  string version = 3;
  // metadata holds the resource metadata; the name is the host ID of the
  // Discovery Service instance and expires carries the heartbeat TTL.
  teleport.header.v1.Metadata metadata = 4;
  // spec is the effective configuration reported by the instance.
  DiscoveryServiceSpec spec = 5;
  // status is reserved for possible future runtime-status reporting and is
  // empty in v1.
  DiscoveryServiceStatus status = 6;
}

// DiscoveryServiceSpec describes the effective configuration of a Discovery
// Service instance. Every field changes only through human action (a config
// edit, a process restart, or DiscoveryConfig CRUD); it never carries
// machine-speed runtime data such as sync results.
message DiscoveryServiceSpec {
  // hostname is the configured hostname of the machine running the instance,
  // for troubleshooting and debugging.
  string hostname = 1;
  // teleport_version is the Teleport version of the instance.
  string teleport_version = 2;
  // discovery_group is the discovery group this instance claims; dynamic
  // DiscoveryConfigs are adopted when their discovery_group matches this
  // value exactly. Empty for static-only instances.
  string discovery_group = 3;
  // poll_interval is the cadence at which the instance runs its discovery
  // cycles.
  google.protobuf.Duration poll_interval = 4;
  // static_matchers is the effective set of matchers from the instance's
  // configuration file: post-normalization and post-discard, i.e. what the
  // instance actually runs.
  StaticMatchers static_matchers = 5;
  // discarded_matchers lists static matchers from the configuration file
  // that the instance discarded at load time, with reasons.
  repeated DiscardedMatcher discarded_matchers = 6;
  // bound_discovery_configs lists the dynamic DiscoveryConfigs this instance
  // has adopted, by reference; their specs are readable on the
  // DiscoveryConfig resources themselves and are deliberately not duplicated
  // here.
  repeated DiscoveryConfigBinding bound_discovery_configs = 7;
  // matchers_truncated is set when static_matchers detail was replaced by
  // counts because the payload exceeded the size budget; consumers must then
  // treat matcher visibility as partial rather than authoritative.
  bool matchers_truncated = 8;
  // static_matcher_counts carries per-cloud effective matcher counts (keys:
  // "aws", "azure", "gcp", "kube", "access_graph") when matchers_truncated is
  // set, so consumers retain scale information after detail is dropped.
  map<string, int32> static_matcher_counts = 9;
}

// StaticMatchers is the effective set of matchers loaded from the Discovery
// Service instance's configuration file, mirroring the Matchers available on
// DiscoveryConfig specs. The Access Graph client connection configuration
// (address, CA) is host plumbing rather than discovery semantics and is
// excluded.
message StaticMatchers {
  // aws is the effective set of AWS matchers.
  repeated types.AWSMatcher aws = 1;
  // azure is the effective set of Azure matchers.
  repeated types.AzureMatcher azure = 2;
  // gcp is the effective set of GCP matchers.
  repeated types.GCPMatcher gcp = 3;
  // kube is the effective set of Kubernetes matchers.
  repeated types.KubernetesMatcher kube = 4;
  // access_graph is the effective Access Graph sync configuration (which
  // cloud accounts and subscriptions are synced into the Access Graph).
  types.AccessGraphSync access_graph = 5;
}

// DiscardedMatcher describes a matcher that a Discovery Service instance
// refused to run, and why. Discards depend on per-instance credential mode
// (for example, integration-only mode on Teleport Cloud discards matchers
// that rely on ambient credentials), so the same configuration may be
// discarded differently by different instances.
message DiscardedMatcher {
  // cloud identifies the matcher family: "aws", "azure", "gcp" or "kube".
  string cloud = 1;
  // position is the index of the discarded matcher within the original
  // pre-discard matcher list for that cloud.
  int32 position = 2;
  // reason is a human-readable explanation of why the matcher was discarded.
  string reason = 3;
}

// DiscoveryConfigBinding records the adoption of one dynamic DiscoveryConfig
// by this Discovery Service instance, including adoption failures that are
// otherwise visible only in the instance's local logs.
message DiscoveryConfigBinding {
  // name is the name of the adopted DiscoveryConfig.
  string name = 1;
  // state is "LOADED" when the config's matchers were compiled into fetchers
  // successfully, or "ERROR" when adoption failed.
  string state = 2;
  // error carries the adoption failure message when state is "ERROR",
  // truncated to 1 KiB; the full error remains in the instance's logs.
  string error = 3;
  // discarded_matchers lists matchers from this config discarded by this
  // instance, capped at 32 entries.
  repeated DiscardedMatcher discarded_matchers = 4;
  // discarded_total is the authoritative number of matchers discarded from
  // this config by this instance, even when discarded_matchers is capped.
  int32 discarded_total = 5;
}

// DiscoveryServiceStatus is reserved for possible future runtime-status
// reporting (for example, sync results for static matchers); it is empty in
// v1 and never populated by the heartbeat itself.
message DiscoveryServiceStatus {}
