syntax = "proto3";

package teleport.discoveryservice.v1;

import "google/protobuf/empty.proto";
import "teleport/discoveryservice/v1/discovery_service.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/discoveryservice/v1;discoveryservicev1";

// DiscoveryServiceService manages discovery_service resources: the presence
// heartbeats of Discovery Service instances carrying their effective
// configuration. See RFD 253.
service DiscoveryServiceService {
  // UpsertDiscoveryService announces a Discovery Service instance's presence
  // and effective configuration. It may only be called by the Discovery
  // builtin role, and only for the resource named by the caller's own host
  // ID.
  rpc UpsertDiscoveryService(UpsertDiscoveryServiceRequest) returns (DiscoveryService);
  // GetDiscoveryService returns a discovery_service resource by name.
  rpc GetDiscoveryService(GetDiscoveryServiceRequest) returns (DiscoveryService);
  // ListDiscoveryServices returns a page of discovery_service resources.
  rpc ListDiscoveryServices(ListDiscoveryServicesRequest) returns (ListDiscoveryServicesResponse);
  // DeleteDiscoveryService removes a discovery_service resource by name.
  rpc DeleteDiscoveryService(DeleteDiscoveryServiceRequest) returns (google.protobuf.Empty);
}

// UpsertDiscoveryServiceRequest is a request to announce a Discovery Service
// instance's presence and effective configuration.
message UpsertDiscoveryServiceRequest {
  // discovery_service is the resource to upsert; its metadata name must be
  // the caller's host ID.
  DiscoveryService discovery_service = 1;
}

// GetDiscoveryServiceRequest is a request to fetch a discovery_service
// resource by name.
message GetDiscoveryServiceRequest {
  // name is the name (host ID) of the discovery_service resource to fetch.
  string name = 1;
}

// ListDiscoveryServicesRequest is a request for a page of discovery_service
// resources.
message ListDiscoveryServicesRequest {
  // page_size is the maximum number of items to return; the server may
  // impose a different page size at its discretion.
  int32 page_size = 1;
  // page_token is the next_page_token value returned from a previous List
  // request, if any.
  string page_token = 2;
}

// ListDiscoveryServicesResponse is a page of discovery_service resources.
message ListDiscoveryServicesResponse {
  // discovery_services is the page of resources.
  repeated DiscoveryService discovery_services = 1;
  // next_page_token is the token to retrieve the next page of results, or
  // empty if there are no more results.
  string next_page_token = 2;
}

// DeleteDiscoveryServiceRequest is a request to delete a discovery_service
// resource by name.
message DeleteDiscoveryServiceRequest {
  // name is the name (host ID) of the discovery_service resource to delete.
  string name = 1;
}
