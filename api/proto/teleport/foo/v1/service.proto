syntax = "proto3";

package teleport.foo.v1;

import "teleport/foo/v1/foo.proto";
import "teleport/scopes/v1/scopes.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/foo/v1;foov1";

// FooService provides an API for managing Foos.
service FooService {
  // Creates a new Foo resource in the backend.
  rpc CreateFoo(CreateFooRequest) returns (CreateFooResponse);
  // Updates an existing Foo in the backend.
  rpc UpdateFoo(UpdateFooRequest) returns (UpdateFooResponse);
  // Creates a new Foo or replaces an existing Foo in the backend.
  rpc UpsertFoo(UpsertFooRequest) returns (UpsertFooResponse);
  // Returns a single Foo matching the request
  rpc GetFoo(GetFooRequest) returns (GetFooResponse);
  // Returns a page of Foos and the token to find the next page of items.
  rpc ListFoos(ListFoosRequest) returns (ListFoosResponse);
  // Remove a matching Foo resource
  rpc DeleteFoo(DeleteFooRequest) returns (DeleteFooResponse);
}

// CreateFooRequest is a request to create a foo.
message CreateFooRequest {
  // The desired Foo to be created.
  Foo foo = 1;
}

// CreateFooResponse is a response to creating a foo.
message CreateFooResponse {
  Foo foo = 1;
}

// UpdateFooRequest is a request to update a Foo.
message UpdateFooRequest {
  // The full Foo resource to update in the backend.
  Foo foo = 1;
}

// UpdateFooRequest is a request to update a Foo.
// UpdateFooResponse is a response to updating a Foo.
message UpdateFooResponse {
  Foo foo = 1;
}

// UpsertFooRequest is a request to upsert a Foo.
message UpsertFooRequest {
  // The full Foo resource to persist in the backend.
  Foo foo = 1;
}

// UpsertFooResponse is a response to upserting a Foo.
message UpsertFooResponse {
  Foo foo = 1;
}

// GetFooRequest is a request to get a Foo.
message GetFooRequest {
  // The name of the foo to request.
  string name = 1;
  // The scope of the foo to request.
  string scope = 2;
}

// GetFooResponse is a response to getting a Foo.
message GetFooResponse {
  Foo foo = 1;
}

// ListFoosRequest is a request to list Foos.
message ListFoosRequest {
  // The maximum number of items to return.
  // The server may impose a different page size at its discretion.
  int32 page_size = 1;
  // The next_page_token value returned from a previous List request, if any.
  string page_token = 2;
  // Filters foos by scope.
  teleport.scopes.v1.Filter scope_filter = 3;
}

// ListFoosRequest is a response to listing Foos.
message ListFoosResponse {
  // The page of Foo that matched the request.
  repeated Foo foos = 1;
  // Token to retrieve the next page of results, or empty if there are no
  // more results in the list.
  string next_page_token = 2;
}

// DeleteFooRequest is a request to delete a Foo.
message DeleteFooRequest {
  // Name of the foo to remove.
  string name = 1;
  // Scope of the foo to remove.
  string scope = 2;
}

// DeleteFooResponse is a response to deleting a Foo.
message DeleteFooResponse {}
