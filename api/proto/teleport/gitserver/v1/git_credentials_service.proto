syntax = "proto3";

package teleport.gitserver.v1;

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/gitserver/v1;gitserverv1";

// GitCredentialsService provides methods to manage Git credentials.
// This service is independent of GitServerService to avoid coupling with
// future git server resource migrations.
service GitCredentialsService {
  // CheckGitCredentials checks whether stored git credentials exist for the
  // calling user.
  rpc CheckGitCredentials(CheckGitCredentialsRequest) returns (CheckGitCredentialsResponse);

  // RevokeGitCredentials revokes stored git credentials for the calling user.
  rpc RevokeGitCredentials(RevokeGitCredentialsRequest) returns (RevokeGitCredentialsResponse);

  // GenerateGitHubAppToken generates a GitHub App access token for git
  // operations. Auth verifies the provided user certificate and returns a
  // valid access token for the user.
  rpc GenerateGitHubAppToken(GenerateGitHubAppTokenRequest) returns (GenerateGitHubAppTokenResponse);
}

// CheckGitCredentialsRequest is a request to check whether stored git
// credentials exist for the calling user.
message CheckGitCredentialsRequest {
  // GitServerName is the name of the git server.
  string git_server_name = 1;
}

// CheckGitCredentialsResponse contains the result of checking git credentials.
message CheckGitCredentialsResponse {
  // Valid indicates whether valid credentials exist for the user.
  bool valid = 1;
  // GitHubUsername is the GitHub username associated with the credentials.
  string github_username = 2;
}

// RevokeGitCredentialsRequest is a request to revoke stored git credentials.
message RevokeGitCredentialsRequest {
  // GitServerName is the name of the git server.
  string git_server_name = 1;
}

// RevokeGitCredentialsResponse is the response to RevokeGitCredentials.
message RevokeGitCredentialsResponse {}

// GenerateGitHubAppTokenRequest is a request to generate a GitHub App access
// token for git operations.
message GenerateGitHubAppTokenRequest {
  // UserCert is the user's git TLS certificate, used as proof of a valid git
  // session. Auth verifies this certificate was signed by its own CA and
  // extracts the user identity from it.
  bytes user_cert = 1;
}

// GenerateGitHubAppTokenResponse contains the generated GitHub App access token.
message GenerateGitHubAppTokenResponse {
  // AccessToken is the GitHub access token.
  string access_token = 1;
}
