syntax = "proto3";

package teleport.delegation.v1;

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/delegation/v1;delegationv1";

// Delegation represents the relationship between one identity (the "delegate")
// and another (the "delegator") on whose behalf the delegate is acting.
//
// Delegates can sub-delegate to other delegates, forming a chain, in which each
// Delegation object is a link. The most deeply nested Delegation (i.e. the tail
// of the linked-list) represents the original delegator.
//
// NOTE: Remember to keep this in-sync with api/proto/teleport/legacy/types.delegation.proto.
message Delegation {
  // Identity of the delegator.
  oneof delegator {
    // Human user who delegated their access to the delegate.
    UserDelegator user = 1;

    // Machine user who delegated their access to the delegate.
    BotDelegator bot = 2;
  }

  // Previous link in the delegation chain, i.e. the user or bot who delegated
  // their access to the delegator.
  Delegation previous = 3;
}

// UserDelegator describes a human user who delegated their access.
message UserDelegator {
  // Username of the human user who delegated their access.
  string username = 1;
}

// BotDelegator describes a machine user that delegated its access.
message BotDelegator {
  // Name of the bot that delegated its access.
  string name = 1;

  // Scope of the bot that delegated its access.
  string scope = 2;
}
