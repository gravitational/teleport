syntax = "proto3";

package teleport.burger.v1;

import "teleport/header/v1/metadata.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/burger/v1;burgerv1";

// Burger is a resource that represents a burger.
message Burger {
  // The kind of resource represented.
  string kind = 1;
  // An optional subkind to differentiate variations of the same kind.
  string sub_kind = 2;
  // The version of the resource being represented.
  string version = 3;
  // Common metadata that all resources share.
  teleport.header.v1.Metadata metadata = 4;
  // The specific properties of a Burger. These should only be modified by
  // the creator/owner of the resource and not dynamically altered or updated.
  BurgerSpec spec = 5;
}

// BurgerSpec contains specific properties of a Burger
message BurgerSpec {
  // Toppings is the list of toppings on the burger.
  repeated string toppings = 1;
}
