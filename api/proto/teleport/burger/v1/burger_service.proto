syntax = "proto3";

package teleport.burger.v1;

import "google/protobuf/empty.proto";
import "teleport/burger/v1/burger.proto";

option go_package = "github.com/gravitational/teleport/api/gen/proto/go/teleport/burger/v1;burgerv1";

// BurgerService provides CRUD ops for Burger resources.
service BurgerService {
  // CreateBurger creates a new Burger.
  rpc CreateBurger(CreateBurgerRequest) returns (google.protobuf.Empty);

  // GetBurger returns the specified Burger.
  rpc GetBurger(GetBurgerRequest) returns (Burger);

  // FetchAllBurgers returns all Burger resources.
  rpc FetchAllBurgers(FetchAllBurgersRequest) returns (FetchAllBurgersResponse);

  // UpdateBurger updates an existing Burger.
  rpc UpdateBurger(UpdateBurgerRequest) returns (Burger);

  // DeleteBurger deletes the specified Burger.
  rpc DeleteBurger(DeleteBurgerRequest) returns (google.protobuf.Empty);
}

// Request for CreateBurger.
message CreateBurgerRequest {
  // Burger is the resource to create.
  Burger burger = 1;
}

// Request for GetBurger.
message GetBurgerRequest {
  // Name is the name of the Burger to retrieve.
  string name = 1;
}

// Request for FetchAllBurgers.
message FetchAllBurgersRequest {}

// Response for FetchAllBurgers.
message FetchAllBurgersResponse {
  // Burgers is a page of Burger resources.
  repeated Burger burgers = 1;
}

// Request for UpdateBurger.
message UpdateBurgerRequest {
  // Burger is the resource to update.
  Burger burger = 1;
}

// Request for DeleteBurger.
message DeleteBurgerRequest {
  // Name is the name of the Burger to delete.
  string name = 1;
}
