                          type: array
                        parent_compartments:
                          items:
                            type: string
                          nullable: true
                          type: array
                        regions:
                          items:
                            type: string
                          nullable: true
                          type: array
                        tenancy:
                          type: string
                      type: object
                    nullable: true
                    type: array
                type: object
              roles:
                description: The list of roles associated with the token. They will
                  be converted to metadata in the SSH and X509 certificates issued
                  to the user of the token.
                items:
                  type: string
                nullable: true
                type: array
              usage_mode:
                description: The usage mode of the token. Can be "single_use" or "unlimited".
                  Single use tokens can only be used to provision a single resource.
                  Unlimited tokens can be be used to provision any number of resources
                  until it expires.
                type: string
            type: object
          status:
            description: Status defines the observed state of the Teleport resource
            properties:
              conditions:
                description: Conditions represent the latest available observations
