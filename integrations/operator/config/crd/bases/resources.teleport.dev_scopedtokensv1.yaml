    plural: teleportscopedtokensv1
    shortNames:
    - scopedtokenv1
    - scopedtokensv1
    singular: teleportscopedtokenv1
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: ScopedTokenV1 is the Schema for the scopedtokensv1 API
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          scope:
            description: Scope is the scope of the token resource.
            type: string
          spec:
            description: ScopedToken resource definition v1 from Teleport
            properties:
              assigned_scope:
                description: The scope to which this token is assigned.  Must be equivalent
                  or descendent to the scope of the token itself.
                type: string
              aws:
                description: The AWS-specific configuration used with the "ec2" and
                  "iam" join methods.
                nullable: true
                properties:
                  allow:
                    description: A list of Rules for allowing use of this token. A
                      node must match at least one allow rule in order to use this
                      token.
                    items:
                      properties:
                        aws_account:
                          type: string
                        aws_arn:
                          type: string
                        aws_organization_id:
                          type: string
                        aws_regions:
                          items:
                            type: string
                          nullable: true
                          type: array
                        aws_role:
                          type: string
                      type: object
                    nullable: true
                    type: array
                  iid_ttl:
                    description: The TTL to use for AWS EC2 Instance Identity Documents
                      used to join the cluster with this token. This should be a duration
                      string such as "8h" or "6mo".
                    type: string
                  integration:
                    description: Integration name which provides credentials for validating
                      join attempts. Currently only in use for validating the AWS
                      Organization ID in the IAM Join method.
                    type: string
                type: object
              azure:
                description: The Azure-specific configuration used with the "azure"
                  join method.
                nullable: true
                properties:
                  allow:
                    description: A list of Rules for allowing use of this token. A
                      node must match at least one allow rule in order to use this
                      token.
                    items:
                      properties:
                        resource_groups:
                          items:
                            type: string
                          nullable: true
                          type: array
                        subscription:
                          type: string
                        tenant:
                          type: string
                      type: object
                    nullable: true
                    type: array
                type: object
              azure_devops:
                description: The Azure Devops-specific configuration used with the
                  "azure_devops" join method.
                nullable: true
                properties:
                  allow:
                    description: A list of Rules for allowing use of this token. A
                      node must match at least one allow rule in order to use this
                      token.
                    items:
                      properties:
                        definition_id:
                          type: string
                        pipeline_name:
                          type: string
                        project_id:
                          type: string
                        project_name:
                          type: string
                        repository_ref:
                          type: string
                        repository_uri:
                          type: string
                        repository_version:
                          type: string
                        sub:
                          type: string
                      type: object
                    nullable: true
                    type: array
                  organization_id:
                    description: The UUID of the Azure DevOps organization that this
                      join token will grant access to. This is used to identify the
                      correct issuer verification of the ID token. This is a required
                      field.
                    type: string
                type: object
              bot_name:
                description: Name of the bot associated with this join token, if any.
                type: string
              bot_scope:
                description: Scope of the bot associated with this join token. Required
                  if bot_name is set, and mutually exclusive with assigned_scope.
                type: string
              bound_keypair:
                description: Configuration specific to the "bound_keypair" join method.
                nullable: true
                properties:
                  onboarding:
                    description: Parameters related to initial onboarding and keypair
                      registration.
                    nullable: true
                    properties:
                      initial_public_key:
                        type: string
                      must_register_before:
                        format: date-time
                        type: string
                      registration_secret:
                        type: string
                    type: object
                  recovery:
                    description: Parameters related to recovery after identity expiration,
                      including the initial join.
                    nullable: true
                    properties:
                      limit:
                        format: int32
                        type: integer
                      mode:
                        type: string
                    type: object
                  rotate_after:
                    description: An optional timestamp that forces clients to perform
                      a keypair rotation on the next join or recovery attempt after
                      the given date. If `LastRotatedAt` is unset or before this timestamp,
                      a rotation will be requested. It is recommended to set this
                      value to the current timestamp if a rotation should be triggered
                      on the next join attempt.
                    format: date-time
                    type: string
                type: object
              gcp:
                description: The GCP-specific configuration used with the "gcp" join
                  method.
                nullable: true
                properties:
                  allow:
                    description: A list of Rules for allowing use of this token. A
                      node must match at least one allow rule in order to use this
                      token.
                    items:
                      properties:
                        locations:
                          items:
                            type: string
                          nullable: true
                          type: array
                        project_ids:
                          items:
                            type: string
                          nullable: true
                          type: array
                        service_accounts:
                          items:
                            type: string
                          nullable: true
                          type: array
                      type: object
                    nullable: true
                    type: array
                type: object
              immutable_labels:
                description: Immutable labels that should be applied to any resulting
                  resources provisioned using this token.
                nullable: true
                properties:
                  ssh:
                    additionalProperties:
                      type: string
                    description: Labels that should be applied to SSH nodes.
                    nullable: true
                    type: object
                type: object
              join_method:
                description: The joining method required in order to use this token.
                  Note that not all join methods support joining with scoped tokens.
                type: string
              kubernetes:
                description: The Kubernetes-specific configuration used with the "kubernetes"
