  # TODO(adamcarheden): identical to the teleport-proxy-lib test; kept so this PR's diff stays minimal, remove next PR
  - it: sets "proxy_protocol" to "on"
    set:
      proxyProtocol: "on"
      clusterName: teleport.example.com
    # expected: ConfigMap/RELEASE-NAME-proxy
    # 0 - ConfigMap/RELEASE-NAME-proxy
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'proxy_protocol: "on"'

