      - notMatchRegex:
          path: data.teleport\.yaml
          pattern: 'proxy_protocol:'

  - it: sets extraLabels on Configmap
    values:
      - ../.lint/annotations.yaml
    set:
      extraLabels:
        config:
          foo: bar
          baz: override-me
      proxy:
        extraLabels:
          config:
            baz: overridden
    # expected: ConfigMap/RELEASE-NAME-proxy
    # 0 - ConfigMap/RELEASE-NAME-proxy
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - equal:
          path: metadata.labels.foo
          value: bar
      - equal:
          path: metadata.labels.baz
          value: overridden

  - it: sets clusterDomain on Configmap
    set:
      clusterName: teleport.example.com
      global:
        clusterDomain: test.com
    # expected: ConfigMap/RELEASE-NAME-proxy
    # 0 - ConfigMap/RELEASE-NAME-proxy
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - matchSnapshot: {}
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'svc.test.com:3025'
