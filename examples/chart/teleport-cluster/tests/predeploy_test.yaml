suite: Pre-Deploy Config Test Hooks
templates:
  - auth/predeploy_job.yaml
  - auth/predeploy_config.yaml
  - auth/predeploy_serviceaccount.yaml
  - proxy.yaml
tests:
  - it: Deploys the auth-test config
    template: auth/predeploy_config.yaml
    set:
      clusterName: helm-lint
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: RELEASE-NAME-auth-test
          namespace: NAMESPACE

  - it: Deploys the proxy-test config
    template: proxy.yaml
    set:
      clusterName: helm-lint
    # expected: ConfigMap/RELEASE-NAME-proxy-test
    # 2 - ConfigMap/RELEASE-NAME-proxy-test
    documentIndex: 2
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: RELEASE-NAME-proxy-test
          namespace: NAMESPACE

  - it: Deploys the auth-test job
    template: auth/predeploy_job.yaml
    set:
      clusterName: helm-lint
    asserts:
      - containsDocument:
          kind: Job
          apiVersion: batch/v1
          name: RELEASE-NAME-auth-test
          namespace: NAMESPACE

  - it: Is executed as a pre-install and pre-upgrade hook
    template: proxy.yaml
    set:
      clusterName: helm-lint
    # expected:
    # 2 - ConfigMap/RELEASE-NAME-proxy-test
    # 3 - Job/RELEASE-NAME-proxy-test
    # 4 - ServiceAccount/RELEASE-NAME-proxy-hook
    asserts:
      - isKind:
          of: ConfigMap
        documentIndex: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
        documentIndex: 2
      - equal:
          path: metadata.annotations.helm\.sh/hook
          value: pre-install,pre-upgrade
        documentIndex: 2
      - isKind:
          of: Job
        documentIndex: 3
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
        documentIndex: 3
      - equal:
          path: metadata.annotations.helm\.sh/hook
          value: pre-install,pre-upgrade
        documentIndex: 3
      - isKind:
          of: ServiceAccount
        documentIndex: 4
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-hook
        documentIndex: 4
      - equal:
          path: metadata.annotations.helm\.sh/hook
          value: pre-install,pre-upgrade
        documentIndex: 4

  - it: Does not render hooks when config validation is disabled
    template: proxy.yaml
    set:
      clusterName: helm-lint
      validateConfigOnDeploy: false
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: RELEASE-NAME-proxy-test
        not: true
      - containsDocument:
          kind: Job
          apiVersion: batch/v1
          name: RELEASE-NAME-proxy-test
        not: true
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: RELEASE-NAME-proxy-hook
        not: true

  - it: should not set resources on auth predeploy job when resources set in values
    template: auth/predeploy_job.yaml
    values:
      - ../.lint/resources.yaml
    asserts:
      - isEmpty:
          path: spec.template.spec.containers[0].resources

  - it: should not set resources on proxy predeploy job when resources set in values
    template: proxy.yaml
    values:
      - ../.lint/resources.yaml
    # expected: Job/RELEASE-NAME-proxy-test
    # 3 - Job/RELEASE-NAME-proxy-test
    documentIndex: 3
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - isEmpty:
          path: spec.template.spec.containers[0].resources

  - it: should set resources on auth predeploy job when jobResources set in values
    template: auth/predeploy_job.yaml
    values:
      - ../.lint/resources.yaml
    set:
      jobResources:
        limits:
          memory: 512Mi
        requests:
          memory: 512Mi
          cpu: 1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi

  - it: should set resources on proxy predeploy job when jobResources set in values
    template: proxy.yaml
    values:
      - ../.lint/resources.yaml
    set:
      jobResources:
        limits:
          memory: 512Mi
        requests:
          memory: 512Mi
          cpu: 1
    # expected: Job/RELEASE-NAME-proxy-test
    # 3 - Job/RELEASE-NAME-proxy-test
    documentIndex: 3
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi

  - it: should set imagePullSecrets on proxy predeploy job when set in values
    template: proxy.yaml
    values:
      - ../.lint/imagepullsecrets.yaml
    # expected: Job/RELEASE-NAME-proxy-test
    # 3 - Job/RELEASE-NAME-proxy-test
    documentIndex: 3
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: myRegistryKeySecretName
      - matchSnapshot:
          path: spec.template.spec.imagePullSecrets

  - it: should set imagePullSecrets on auth predeploy job when set in values
    template: auth/predeploy_job.yaml
    values:
      - ../.lint/imagepullsecrets.yaml
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: myRegistryKeySecretName
      - matchSnapshot:
          path: spec.template.spec.imagePullSecrets

  - it: should set extraLabels on auth predeploy job when set in values
    template: auth/predeploy_job.yaml
    set:
      clusterName: helm-lint
      extraLabels:
        job:
          foo: bar
          baz: override-me
      auth:
        extraLabels:
          job:
            baz: overridden
    asserts:
      - equal:
          path: metadata.labels.foo
          value: bar
      - equal:
          path: metadata.labels.baz
          value: overridden

  - it: should set extraLabels.jobPod on auth predeploy job when set in values
    template: auth/predeploy_job.yaml
    set:
      clusterName: helm-lint
      extraLabels:
        jobPod:
          foo: bar
          baz: override-me
      auth:
        extraLabels:
          jobPod:
            baz: overridden
    asserts:
      - equal:
          path: spec.template.metadata.labels.foo
          value: bar
      - equal:
          path: spec.template.metadata.labels.baz
          value: overridden

  - it: should set extraLabels on auth predeploy config when set in values
    template: auth/predeploy_config.yaml
    set:
      clusterName: helm-lint
      extraLabels:
        config:
          foo: bar
          baz: override-me
      auth:
        extraLabels:
          config:
            baz: overridden
    asserts:
      - equal:
          path: metadata.labels.foo
          value: bar
      - equal:
          path: metadata.labels.baz
          value: overridden

  - it: should set extraLabels on proxy predeploy job when set in values
    template: proxy.yaml
    set:
      clusterName: helm-lint
      extraLabels:
        job:
          foo: bar
          baz: override-me
      proxy:
        extraLabels:
          job:
            baz: overridden
    # expected: Job/RELEASE-NAME-proxy-test
    # 3 - Job/RELEASE-NAME-proxy-test
    documentIndex: 3
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - equal:
          path: metadata.labels.foo
          value: bar
      - equal:
          path: metadata.labels.baz
          value: overridden

  - it: should set extraLabels.jobPod on proxy predeploy job when set in values
    template: proxy.yaml
    set:
      clusterName: helm-lint
      extraLabels:
        jobPod:
          foo: bar
          baz: override-me
      proxy:
        extraLabels:
          jobPod:
            baz: overridden
    # expected: Job/RELEASE-NAME-proxy-test
    # 3 - Job/RELEASE-NAME-proxy-test
    documentIndex: 3
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - equal:
          path: spec.template.metadata.labels.foo
          value: bar
      - equal:
          path: spec.template.metadata.labels.baz
          value: overridden

  - it: should set extraLabels on proxy predeploy config when set in values
    template: proxy.yaml
    set:
      clusterName: helm-lint
      extraLabels:
        config:
          foo: bar
          baz: override-me
      proxy:
        extraLabels:
          config:
            baz: overridden
    # expected: ConfigMap/RELEASE-NAME-proxy-test
    # 2 - ConfigMap/RELEASE-NAME-proxy-test
    documentIndex: 2
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - equal:
          path: metadata.labels.foo
          value: bar
      - equal:
          path: metadata.labels.baz
          value: overridden

  - it: should use default serviceAccount name suffixed with -hook for auth predeploy job SA when not set in values and we're creating SAs
    template: auth/predeploy_job.yaml
    set:
      clusterName: helm-lint
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-hook

  - it: should use serviceAccount.name suffixed with -hook for auth predeploy job SA when set in values and we're creating SAs
    template: auth/predeploy_job.yaml
    set:
      clusterName: helm-lint
      serviceAccount:
        name: helm-test-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: helm-test-sa-hook

  - it: should use serviceAccount.name for auth predeploy job SA when set in values and we're not creating SAs
    template: auth/predeploy_job.yaml
    set:
      clusterName: helm-lint
      serviceAccount:
        name: helm-test-sa
        create: false
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: helm-test-sa

  - it: should use default serviceAccount name suffixed with -hook for proxy predeploy job SA when not set in values and we're creating SAs
    template: proxy.yaml
    set:
      clusterName: helm-lint
    # expected: Job/RELEASE-NAME-proxy-test
    # 3 - Job/RELEASE-NAME-proxy-test
    documentIndex: 3
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-proxy-hook

  - it: should use serviceAccount.name suffixed with -hook for proxy predeploy job SA when set in values and we're creating SAs
    template: proxy.yaml
    set:
      clusterName: helm-lint
      serviceAccount:
        name: helm-test-sa
    # expected: Job/RELEASE-NAME-proxy-test
    # 3 - Job/RELEASE-NAME-proxy-test
    documentIndex: 3
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - equal:
          path: spec.template.spec.serviceAccountName
          value: helm-test-sa-proxy-hook

  - it: should use serviceAccount.name for proxy predeploy job SA when set in values and we're not creating SAs
    template: proxy.yaml
    set:
      clusterName: helm-lint
      serviceAccount:
        name: helm-test-sa
        create: false
    # expected: Job/RELEASE-NAME-proxy-test
    # 3 - Job/RELEASE-NAME-proxy-test
    documentIndex: 3
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy-test
      - equal:
          path: spec.template.spec.serviceAccountName
          value: helm-test-sa-proxy
