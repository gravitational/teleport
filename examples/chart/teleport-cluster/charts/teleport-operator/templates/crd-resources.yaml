{{- /* IMPORTANT - DO NOT RENAME THIS FILE BACK TO `crds.yaml`.
The helm-unittest plugin (v1.x) silently excludes any template named exactly
`templates/crds.yaml` from the manifests it renders for testing -- it mirrors
Helm's special-casing of the top-level `crds/` directory. With the file named
`crds.yaml`, every assertion in crds_test.yaml fails with
"template ... not exists or not selected in test suite" and the CRDs become
untestable. Real Helm renders this template identically regardless of filename
(only the generated `# Source:` comment differs), so naming it
`crd-resources.yaml` changes nothing at install time while keeping it testable.

This template iterates over every CRD in the `operator-crds/` directory
and creates them if needed. It also adds common labels, like any other
Helm-deployed resource.

We cannot rely on the "crds/" Helm directory as Helm's strategy is "fire and forget".
We have no way to update the CRDs after the initial deployment. As Teleport keeps
adding new field to existing CRs, we need a deployment strategy that supports
updating CRDs.

The obvious solution would be to have a separate chart for CRs but we wanted to
have everything functional in a single "helm install", hence the rube goldberg
mechanism to try to guess what to do with the CRDs (see the implementation of
shouldInstallCRDs in _helpers.yaml for more details). */ -}}
{{- if eq (include "teleport-cluster.operator.shouldInstallCRDs" . ) "true" -}}
{{ $ctx := . }}
{{- $crdValidationSupport := semverCompare ">=1.25.0-0" .Capabilities.KubeVersion.Version -}}
{{ range $path, $_ :=  .Files.Glob  "operator-crds/*" }}
  {{- with $ctx }}
    {{- $raw := (.Files.Get $path | fromYaml) -}}
    {{- if not $crdValidationSupport -}}
      {{- range $version := $raw.spec.versions -}}
        {{- $_ := unset $version.schema.openAPIV3Schema "x-kubernetes-validations" -}}
      {{- end -}}
    {{- end -}}
    {{- $injectedCRD := mustMergeOverwrite $raw (include "teleport-cluster.operator.crdOverrides" $ctx | fromYaml) -}}
    {{/* Only render the CRD if the operator deployment is unscoped, or if the CRD is scoped.
         This makes sure we don't deploy unscoped CRDs on a scoped operator.
         Note: scopedCRD is a string. */}}
    {{- $scopedCRD := (dig "metadata" "annotations" "resources.teleport.dev/scoped" "unknown" $raw) -}}
    {{- if or (not .Values.scoped) (eq $scopedCRD "true") -}}
      {{- toYaml $injectedCRD }}
---
    {{- end }}
  {{- end }}
{{ end }}
{{- end -}}
