suite: Proxy ServiceAccount
templates:
  - serviceaccount.yaml
tests:
  # Move to lib: pure lib rendering
  - it: sets ServiceAccount annotations when specified
    values:
      - ../.lint/annotations.yaml
    asserts:
      - equal:
          path: metadata.annotations.kubernetes\.io/serviceaccount
          value: test-annotation
      - equal:
          path: metadata.annotations.kubernetes\.io/serviceaccount-different
          value: 6

  # The library uses a custom serviceAccount.name verbatim. Appending a suffix
  # like "-proxy" is the consuming chart's responsibility (see teleport-cluster).
  - it: uses serviceAccount.name verbatim when set
    set:
      clusterName: helm-lint
      serviceAccount:
        create: true
        name: my-custom-sa
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: my-custom-sa

  # Move to lib: pure lib rendering
  - it: does not set automountServiceAccountToken if cluster version is <1.20
    set:
      clusterName: helm-lint
    capabilities:
      majorVersion: 1
      minorVersion: 18
    asserts:
      - notEqual:
          path: automountServiceAccountToken
          value: false

  # Move to lib: pure lib rendering
  - it: sets automountServiceAccountToken to false if cluster version is >=1.20
    set:
      clusterName: helm-lint
    capabilities:
      majorVersion: 1
      minorVersion: 20
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false
