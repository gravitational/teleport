suite: Pre-Deploy Config Test Hooks
templates:
  - predeploy_job.yaml
  - predeploy_config.yaml
  - predeploy_serviceaccount.yaml
tests:
  - it: Deploys the proxy-test config
    template: predeploy_config.yaml
    set:
      clusterName: helm-lint
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: RELEASE-NAME-proxy-test
          namespace: NAMESPACE

  - it: should not set resources on proxy predeploy job when resources set in values
    template: predeploy_job.yaml
    values:
      - ../.lint/resources.yaml
    asserts:
      - isEmpty:
          path: spec.template.spec.containers[0].resources

  - it: should set resources on proxy predeploy job when jobResources set in values
    template: predeploy_job.yaml
    values:
      - ../.lint/resources.yaml
    set:
      jobResources:
        limits:
          memory: 512Mi
        requests:
          memory: 512Mi
          cpu: 1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi

  - it: should set imagePullSecrets on proxy predeploy job when set in values
    template: predeploy_job.yaml
    values:
      - ../.lint/imagepullsecrets.yaml
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: myRegistryKeySecretName
      - matchSnapshot:
          path: spec.template.spec.imagePullSecrets

  - it: should use default serviceAccount name suffixed with -hook for proxy predeploy job SA when not set in values and we're creating SAs
    template: predeploy_job.yaml
    set:
      clusterName: helm-lint
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-proxy-hook