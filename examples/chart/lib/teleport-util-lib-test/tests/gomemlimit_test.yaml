suite: GOMEMLIMIT
templates:
  - templates/gomemlimit.yaml
tests:
  - it: sets GOMEMLIMIT by default with SI units
    set:
      resources:
        limits:
          memory: "10.5G"
      goMemLimitRatio: 0.9
    asserts:
      - equal:
          path: data.gomemlimit
          value: "9450000000"

  - it: sets GOMEMLIMIT by default with IEC units
    set:
      resources:
        limits:
          memory: "10.5Gi"
      goMemLimitRatio: 0.9
    asserts:
      - equal:
          path: data.gomemlimit
          value: "10146860237"

  - it: sets GOMEMLIMIT by default with scientific notation
    set:
      resources:
        limits:
          memory: "10.5e9"
      goMemLimitRatio: 0.9
    asserts:
      - equal:
          path: data.gomemlimit
          value: "9450000000"

  - it: does not override an explicit GOMEMLIMIT
    set:
      resources:
        limits:
          memory: "10.5G"
      goMemLimitRatio: 0.9
      extraEnv:
        - name: FOO
          value: bar
        - name: GOMEMLIMIT
          value: "5GB"
    asserts:
      - equal:
          path: data.gomemlimit
          value: ""

  - it: does not set GOMEMLIMIT if the ratio is zero
    set:
      resources:
        limits:
          memory: "10.5G"
      goMemLimitRatio: 0
    asserts:
      - equal:
          path: data.gomemlimit
          value: ""

  - it: does not set GOMEMLIMIT if memory limits are missing
    set:
      goMemLimitRatio: 0.9
    asserts:
      - equal:
          path: data.gomemlimit
          value: ""

  - it: sets GOMEMLIMIT with integer IEC units
    set:
      resources:
        limits:
          memory: "512Mi"
      goMemLimitRatio: 0.9
    asserts:
      - equal:
          path: data.gomemlimit
          value: "483183821"

  - it: does not set GOMEMLIMIT if ratio is not set
    set:
      resources:
        limits:
          memory: "10.5G"
    asserts:
      - equal:
          path: data.gomemlimit
          value: ""
