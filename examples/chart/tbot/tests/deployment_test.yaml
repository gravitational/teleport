suite: Test Deployment
templates:
  - deployment.yaml
  - config.yaml
tests:
  - it: should match the snapshot (simple)
    template: deployment.yaml
    values:
      - ../.lint/simple.yaml
    asserts:
      - matchSnapshot: {}
  - it: should match the snapshot (full)
    template: deployment.yaml
    values:
      - ../.lint/full.yaml
    asserts:
      - matchSnapshot: {}
  - it: should not contain dnsConfig when not set
    template: deployment.yaml
    values:
      - ../.lint/simple.yaml
    asserts:
      - isNull:
          path: spec.template.spec.dnsConfig
  - it: should contain dnsConfig when set
    template: deployment.yaml
    values:
      - ../.lint/simple.yaml
    set:
      dnsConfig:
        options:
          - name: ndots
            value: "2"
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig
          value:
            options:
              - name: ndots
                value: "2"
