{{- if .Values.headlamp.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-headlamp
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    teleport.dev/name: Headlamp
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
