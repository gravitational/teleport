{{- if and .Values.clusterRoleBinding.create .Values.teleportAuthProxy.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "headlamp.fullname" . }}-impersonate
  labels:
    {{- include "headlamp.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]
{{- end }}
