{{- /*
If validateConfigOnDeploy is true, a hook is used to validate the config. The
hook job creates a pod with the same volumes at the final Proxy pod. Because we
append the token secret as a projected volume to that pod, we must create the
secret during install so it's available for the validation pod before the
chart's permanent manifests exist.

This hook is pre-install only. On upgrades, the permanent Secret from the
previous release already exists and can be mounted by the pre-upgrade
validation Job. Recreating the same Secret as a pre-upgrade hook would risk
deleting the live Secret via the hook lifecycle.
*/ -}}
{{- if or .Values.validateConfigOnDeploy -}}
{{- $ctx := mustDeepCopy . -}}
{{- $_ := set $ctx.Values.annotations.joinTokenSecret "helm.sh/hook" "pre-install" -}}
{{- $_ := set $ctx.Values.annotations.joinTokenSecret "helm.sh/hook-weight" "2" -}}
{{- $_ := set $ctx.Values.annotations.joinTokenSecret "helm.sh/hook-delete-policy" "before-hook-creation,hook-succeeded" -}}
{{- include "teleport-proxy.join-token-secret" $ctx -}}
{{- end -}}
