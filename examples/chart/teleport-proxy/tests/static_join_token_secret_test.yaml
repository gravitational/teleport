suite: Static Join Token Secret
templates:
- joinTokenSecret.yaml
tests:
- it: Creates secret when method is 'token' and create is true
  set:
    auth_server: "auth.teleport.example.com"
    clusterName: my-fake-cluster
    join_params:
      method: token
      token_name: helm-secret
    joinTokenSecret:
      create: true
      name: my-secret
  documentIndex: 0 
  asserts:
  - isKind:
      of: Secret
  - equal:
      path: metadata.name
      value: my-secret
  - equal:
      path: stringData.auth-token
      value: helm-secret
  
- it: Doesn't create secret when joinTokenSecret.create is false
  set:
    auth_server: "auth.teleport.example.com"
    clusterName: my-fake-cluster
    join_params:
      method: token
      token_name: helm-secret
    joinTokenSecret:
      create: false
      name: my-secret
  asserts:
  - hasDocuments:
      count: 0

- it: Doesn't create secret when method is not 'token'
  set:
    auth_server: "auth.teleport.example.com"
    clusterName: my-fake-cluster
    join_params:
      method: kubernetes
      token_name: helm-secret
    joinTokenSecret:
      create: true
      name: my-secret
  asserts:
  - hasDocuments:
      count: 0
