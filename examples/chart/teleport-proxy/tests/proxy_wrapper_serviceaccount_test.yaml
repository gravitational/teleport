suite: Proxy Wrapper ServiceAccount
templates:
  - proxy.yaml
tests:
  - it: does not create a ServiceAccount resource when serviceAccount.create is false
    set:
      clusterName: helm-lint
      authServer: teleport-auth.example.com
      joinParams:
        method: kubernetes
        tokenName: teleport-proxy
      serviceAccount:
        create: false
        name: helm-test-sa
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: helm-test-sa
        not: true

  - it: uses the verbatim serviceAccount name in the Deployment
    set:
      clusterName: helm-lint
      authServer: teleport-auth.example.com
      joinParams:
        method: kubernetes
        tokenName: teleport-proxy
      serviceAccount:
        create: false
        name: helm-test-sa
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.serviceAccountName
          value: helm-test-sa
