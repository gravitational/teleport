suite: Proxy Wrapper Config
templates:
  - proxy.yaml
tests:
  - it: appends :3025 to auth_server when no port is set
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'auth_server: teleport-auth\.example\.com:3025'

  - it: preserves auth_server when an explicit port is set
    set:
      clusterName: teleport.example.com
      auth_server: auth.example.com:9999
      join_params:
        method: kubernetes
        token_name: teleport-proxy
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'auth_server: auth\.example\.com:9999'

  - it: lets proxy.teleportConfig override generated teleport.auth_server
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      proxy:
        teleportConfig:
          teleport:
            auth_server: auth.example.com:9999
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'auth_server: auth\.example\.com:9999'
      - notMatchRegex:
          path: data.teleport\.yaml
          pattern: 'auth_server: teleport-auth\.example\.com:3025'

  - it: writes join_params into the generated teleport config
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: iam
        token_name: proxy-join
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'join_params:\n\s+method: iam\n\s+token_name: proxy-join'

  - it: preserves nested join_params fields in the generated teleport config
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: azure
        token_name: proxy-join
        azure:
          client_id: 11111111-2222-3333-4444-555555555555
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'join_params:\n\s+azure:\n\s+client_id: 11111111-2222-3333-4444-555555555555\n\s+method: azure\n\s+token_name: proxy-join'

  - it: lets proxy.teleportConfig override generated teleport.join_params
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: generated-token
      proxy:
        teleportConfig:
          teleport:
            join_params:
              method: iam
              token_name: overridden-token
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'join_params:\n\s+method: iam\n\s+token_name: overridden-token'
      - notMatchRegex:
          path: data.teleport\.yaml
          pattern: 'join_params:\n\s+method: kubernetes\n\s+token_name: generated-token'

  - it: preserves generated defaults when proxy.teleportConfig overrides only one leaf
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      proxy:
        teleportConfig:
          proxy_service:
            public_addr: custom.example.com:443
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'public_addr: custom\.example\.com:443'
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'auth_server: teleport-auth\.example\.com:3025'
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'method: kubernetes'
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'token_name: teleport-proxy'

  - it: fails when join_params.method is empty
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: ""
        token_name: teleport-proxy
    asserts:
      - failedTemplate:
          errorMessage: "join_params.method is required"

  - it: fails when join_params.token_name is empty
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: ""
    asserts:
      - failedTemplate:
          errorMessage: "join_params.token_name is required"

  - it: fails when join_params.method is token, joinTokenSecret.create is true, and join_params.token_name is empty
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: token
        token_name: ""
      joinTokenSecret:
        create: true
        name: teleport-proxy-join-token
    asserts:
      - failedTemplate:
          errorMessage: "join_params.token_name should be set to the token value when join_params.method is 'token' and joinTokenSecret.create is true"

  - it: fails when join_params.method is token, joinTokenSecret.create is false, and joinTokenSecret.name is empty
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: token
        token_name: ""
      joinTokenSecret:
        create: false
        name: ""
    asserts:
      - failedTemplate:
          errorMessage: "joinTokenSecret.name is required when join_params.method is 'token'"

  - it: keeps wrapper-generated teleport settings in scratch mode
    set:
      chartMode: scratch
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot:
          path: data.teleport\.yaml
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'auth_service:\n\s+enabled: false'
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'proxy_service:\n\s+enabled: true'
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'ssh_service:\n\s+enabled: false'
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'auth_server: teleport-auth\.example\.com:3025'
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'token_name: teleport-proxy'
