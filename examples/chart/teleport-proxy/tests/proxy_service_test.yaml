suite: Proxy Service
templates:
  - proxy.yaml
tests:
  - it: uses a ClusterIP when proxy.service.type=ClusterIP
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      service:
        type: NodePort
      proxy:
        service:
          type: ClusterIP
    documentIndex: 5
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.type
          value: ClusterIP

  - it: fails to deploy when ingress.enabled=true and proxy.service.type is set to LoadBalancer (default)
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      proxyListenerMode: multiplex
      ingress:
        enabled: true
      proxy:
        service:
          type: LoadBalancer
    asserts:
      - failedTemplate:
          errorMessage: "service.type must not be LoadBalancer when using an ingress - any load balancer should be provisioned by your ingress controller. Set service.type=ClusterIP instead"

  - it: uses a ClusterIP when ingress.enabled=true and proxy.service.type=ClusterIP
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      proxyListenerMode: multiplex
      ingress:
        enabled: true
      proxy:
        service:
          type: ClusterIP
    documentIndex: 6
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.type
          value: ClusterIP

  - it: uses a NodePort when ingress.enabled=true and proxy.service.type=NodePort
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      proxyListenerMode: multiplex
      ingress:
        enabled: true
      proxy:
        service:
          type: NodePort
    documentIndex: 6
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.type
          value: NodePort

  - it: uses a NodePort when ingress.enabled=true and proxy.service.type is overridden
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      proxyListenerMode: multiplex
      ingress:
        enabled: true
      proxy:
        service:
          type: NodePort
    documentIndex: 6
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.type
          value: NodePort

  - it: sets extraLabels on Service
    values:
      - ../.lint/annotations.yaml
    set:
      extraLabels:
        service:
          foo: bar
          baz: override-me
      proxy:
        extraLabels:
          service:
            baz: overridden
    documentIndex: 5
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: metadata.labels.foo
          value: bar
      - equal:
          path: metadata.labels.baz
          value: overridden
