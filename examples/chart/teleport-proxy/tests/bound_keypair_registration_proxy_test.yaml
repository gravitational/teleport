suite: Bound Keypair Registration Proxy
templates:
  - proxy.yaml
tests:
  - it: rewrites registration_secret_value to registration_secret_path in the config map when set
    set:
      auth_server: my-server
      clusterName: my-cluster
      join_params:
        method: bound_keypair
        token_name: my-token
        bound_keypair:
          registration_secret_value: one-time-secret
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data.teleport\.yaml
          pattern: 'join_params:\n\s+bound_keypair:\n\s+registration_secret_path: /etc/teleport-secrets/registration-secret'
      - notMatchRegex:
          path: data.teleport\.yaml
          pattern: 'registration_secret_value:'

  - it: does not add registration_secret_path to the config map when registration_secret_value is not set
    set:
      auth_server: my-server
      clusterName: my-cluster
      join_params:
        method: kubernetes
        token_name: my-token
        bound_keypair: {}
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - notMatchRegex:
          path: data.teleport\.yaml
          pattern: 'registration_secret_path:'

  - it: mounts the registration secret volume in the deployment when registration_secret_value is set
    template: proxy.yaml
    set:
      auth_server: my-server
      clusterName: my-cluster
      join_params:
        method: bound_keypair
        token_name: my-token
        bound_keypair:
          registration_secret_value: one-time-secret
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.volumes
          content:
            name: bound-keypair-registration-secret
            secret:
              secretName: RELEASE-NAME-bound-keypair-registration-secret
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /etc/teleport-secrets/registration-secret
            name: bound-keypair-registration-secret
            readOnly: true
            subPath: registration-secret

  - it: does not mount the registration secret volume in the deployment when registration_secret_value is not set
    template: proxy.yaml
    set:
      auth_server: my-server
      clusterName: my-cluster
      join_params:
        method: kubernetes
        token_name: my-token
        bound_keypair: {}
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: bound-keypair-registration-secret
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: bound-keypair-registration-secret
