suite: Proxy Deployment
templates:
  - proxy.yaml
tests:
  - it: should have a single replica when proxy-specific replicaCount is set to 1 and a cert is passed
    template: proxy.yaml
    set:
      clusterName: helm-lint.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      highAvailability:
        certManager:
          enabled: true
          issuerName: helm-lint
      proxy:
        highAvailability:
          replicaCount: 1
    documentIndex: 2
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - equal:
          path: spec.replicas
          value: 1

  - it: sets extraLabels on Deployment
    template: proxy.yaml
    values:
      - ../.lint/annotations.yaml
    set:
      extraLabels:
        deployment:
          foo: bar
          baz: override-me
      proxy:
        extraLabels:
          deployment:
            baz: overridden
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - equal:
          path: metadata.labels.foo
          value: bar
      - equal:
          path: metadata.labels.baz
          value: overridden

  - it: sets projected token audience and ttl for kubernetes join
    template: proxy.yaml
    set:
      clusterName: teleport.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
    capabilities:
      majorVersion: 1
      minorVersion: 21
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.volumes
          content:
            name: proxy-serviceaccount-token
            projected:
              sources:
                - serviceAccountToken:
                    path: token
                    audience: teleport.example.com
                    expirationSeconds: 600
                - configMap:
                    items:
                      - key: ca.crt
                        path: ca.crt
                    name: kube-root-ca.crt
                - downwardAPI:
                    items:
                      - path: "namespace"
                        fieldRef:
                          fieldPath: metadata.namespace

  - it: sets extraLabels on Deployment Pods
    template: proxy.yaml
    values:
      - ../.lint/annotations.yaml
    set:
      extraLabels:
        pod:
          foo: bar
          baz: override-me
      proxy:
        extraLabels:
          pod:
            baz: overridden
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - equal:
          path: spec.template.metadata.labels.foo
          value: bar
      - equal:
          path: spec.template.metadata.labels.baz
          value: overridden

  - it: sets readinessProbe values on Deployment Pods
    template: proxy.yaml
    set:
      clusterName: helm-lint
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      readinessProbe:
        initialDelaySeconds: 9
        periodSeconds: 10
        failureThreshold: 11
        successThreshold: 12
      proxy:
        # we test an auth-specific override
        readinessProbe:
          initialDelaySeconds: 13
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 11
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.successThreshold
          value: 12
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 13

  - it: does not set GOMEMLIMIT if ratio is 0
    template: proxy.yaml
    set:
      clusterName: helm-lint
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      # we set an extra env so contrainers[0].env always exists
      # this makes testing easier
      extraEnv:
        - name: FOO
          value: bar
      resources:
        limits:
          memory: "10.5G"
      # we nest under proxy to check if merge works properly
      proxy:
        goMemLimitRatio: 0
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: "GOMEMLIMIT"
            value: "9450000000"

  - it: should default to multiple replicas when proxy-specific replicaCount is not set
    template: proxy.yaml
    set:
      clusterName: helm-lint.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      tls:
        existingSecretName: my-certs
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - equal:
          path: spec.replicas
          value: 2

  - it: should default to multiple replicas when proxy-specific replicaCount is zero
    template: proxy.yaml
    set:
      clusterName: helm-lint.example.com
      auth_server: teleport-auth.example.com
      join_params:
        method: kubernetes
        token_name: teleport-proxy
      tls:
        existingSecretName: my-certs
      proxy:
        highAvailability:
          replicaCount: 0
    documentIndex: 1
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-proxy
      - equal:
          path: spec.replicas
          value: 2
