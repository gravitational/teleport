suite: Proxy Certificate
templates:
  - proxy.yaml
tests:
  - it: sets extraLabels on Certificate Secret
    values:
      - ../.lint/cert-manager.yaml
    set:
      extraLabels:
        certSecret:
          foo: bar
          baz: override-me
      proxy:
        extraLabels:
          certSecret:
            baz: overridden
    documentIndex: 0
    asserts:
      - isKind:
          of: Certificate
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.secretTemplate.labels.foo
          value: bar
      - equal:
          path: spec.secretTemplate.labels.baz
          value: overridden
