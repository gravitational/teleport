suite: Bound Keypair Registration Secret Hook
templates:
- boundKeypairRegistrationSecret-hook.yaml
tests:
- it: Creates a pre-install hook secret when validateConfigOnDeploy is true
  set:
    validateConfigOnDeploy: true
    auth_server: my-server
    clusterName: my-cluster
    join_params:
      method: bound_keypair
      token_name: my-token
      bound_keypair:
        registration_secret_value: one-time-secret
  documentIndex: 0
  asserts:
  - isKind:
      of: Secret
  - equal:
      path: metadata.name
      value: RELEASE-NAME-bound-keypair-registration-secret
  - equal:
      path: metadata.annotations.helm\.sh/hook
      value: pre-install

- it: Does not create a hook secret when validateConfigOnDeploy is false
  set:
    validateConfigOnDeploy: false
    auth_server: my-server
    clusterName: my-cluster
    join_params:
      method: kubernetes
      token_name: my-token
      bound_keypair:
        registration_secret_value: one-time-secret
  asserts:
  - hasDocuments:
      count: 0
