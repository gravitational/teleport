suite: Proxy ServiceAccount
templates:
  - proxy.yaml
tests:
  - it: sets extraLabels on ServiceAccount
    values:
      - ../.lint/annotations.yaml
    set:
      extraLabels:
        serviceAccount:
          foo: bar
          baz: override
    documentIndex: 6
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: metadata.labels.foo
          value: bar
      - equal:
          path: metadata.labels.baz
          value: override
