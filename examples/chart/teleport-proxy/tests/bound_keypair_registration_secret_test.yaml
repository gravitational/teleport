suite: Bound Keypair Registration Secret
templates:
- boundKeypairRegistrationSecret.yaml
tests:
- it: creates the secret document when registration_secret_value is set
  set:
    auth_server: my-server
    clusterName: my-cluster
    join_params:
      method: bound_keypair
      token_name: my-token
      bound_keypair:
        registration_secret_value: one-time-secret
  documentIndex: 0
  asserts:
  - isKind:
      of: Secret
  - equal:
      path: metadata.name
      value: RELEASE-NAME-bound-keypair-registration-secret
  - equal:
      path: stringData.registration-secret
      value: one-time-secret

- it: does not create the secret document when registration_secret_value is not set
  set:
    auth_server: my-server
    clusterName: my-cluster
    join_params:
      method: kubernetes
      token_name: my-token
      bound_keypair: {}
  asserts:
  - hasDocuments:
      count: 0
