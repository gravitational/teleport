clusterName: test-gcp-cluster
auth_server: teleport-auth.example.com
join_params:
  method: kubernetes
  token_name: teleport-proxy
chartMode: gcp
gcp:
  projectId: gcpproj-123456
  backendTable: test-teleport-firestore-storage-collection
  auditLogTable: test-teleport-firestore-auditlog-collection
  sessionRecordingBucket: test-gcp-session-storage-bucket
highAvailability:
  replicaCount: 2
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: gravitational.io/dedicated
          operator: In
          values:
          - teleport
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - teleport
        topologyKey: kubernetes.io/hostname
      weight: 1
