kind: saml
version: v2
metadata:
  name: duo
spec:
  acs: https://<proxy-url>/v1/webapi/saml/acs/duo
  audience: https://<proxy-url>/v1/webapi/saml/acs/duo
  display: Duo
  entity_descriptor_url: https://sso-XXX.sso.duosecurity.com/saml2/sp/<app-id>/metadata
  issuer: https://sso-XXX.sso.duosecurity.com/saml2/sp/<app-id>/metadata
  allow_idp_initiated: true
  attributes_to_roles:
  - name: groups
    value: '*'
    roles:
    - editor
